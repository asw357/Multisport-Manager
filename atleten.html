<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atletenbeheer - Multisport Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <h1>Atletenbeheer</h1>
        <nav>
            <ul>
                <li><a href="manager.html">Terug naar Manager</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Jouw Atleten</h2>
            <table>
                <thead>
                    <tr>
                        <th>Naam</th>
                        <th>Sport</th>
                        <th>Onderdeel</th>
                        <th>Leeftijd</th>
                        <th>Eigenschappen</th>
                        <th>Acties</th>
                    </tr>
                </thead>
                <tbody id="athlete-list">
                    <!-- Atleten worden hier geladen -->
                </tbody>
            </table>
        </section>
        
        <section style="margin-top: 20px; text-align: center;">
            <a href="training.html" style="display: inline-block; margin-right: 10px; padding: 10px; background-color: #007BFF; color: white; text-decoration: none; border-radius: 5px;">🏋️ Ga naar Training</a>
            <a href="scouting.html" style="display: inline-block; padding: 10px; background-color: #28A745; color: white; text-decoration: none; border-radius: 5px;">🔍 Ga naar Scouten</a>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            loadAthletes();
        });

        function loadAthletes() {
            let user = JSON.parse(localStorage.getItem("loggedInUser"));
            if (!user) {
                window.location.href = "login.html";
                return;
            }
            
            let athletes = JSON.parse(localStorage.getItem("athletes")) || [];
            let userAthletes = athletes.filter(a => a.owner === user.managerName);
            let athleteList = document.getElementById("athlete-list");
            athleteList.innerHTML = "";
            
            userAthletes.forEach((athlete, index) => {
                let row = document.createElement("tr");
                row.innerHTML = `
                    <td>${athlete.name}</td>
                    <td>${athlete.sport}</td>
                    <td>${athlete.event}</td>
                    <td>${athlete.age}</td>
                    <td>${athlete.attributes.map(attr => `${attr.name}: ${attr.value}`).join(", ")}</td>
                    <td>
                        <button onclick="deleteAthlete(${index})">Ontslaan</button>
                    </td>
                `;
                athleteList.appendChild(row);
            });
        }

        function deleteAthlete(index) {
            if (confirm("Weet je zeker dat je deze atleet wilt verwijderen?")) {
                let athletes = JSON.parse(localStorage.getItem("athletes")) || [];
                athletes.splice(index, 1);
                localStorage.setItem("athletes", JSON.stringify(athletes));
                loadAthletes();
            }
        }
    </script>
</body>
</html>
