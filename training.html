<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎓 Training</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ccc;
    }
    th {
      background: #f4f4f4;
    }
    select {
      width: 100%;
    }
    button {
      padding: 6px 12px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🎓 Training</h1>
    <nav><a href="manager.html">⬅️ Terug naar Manager</a></nav>
  </header>

  <main>
    <table>
      <thead>
        <tr>
          <th>Naam</th>
          <th>Leeftijd</th>
          <th>Sport</th>
          <th>Onderdeel</th>
          <th>Snelheid</th>
          <th>Kracht</th>
          <th>Techniek</th>
          <th>Training</th>
          <th>Actie</th>
        </tr>
      </thead>
      <tbody id="atletenTabel">
        <tr><td colspan="9">Laden...</td></tr>
      </tbody>
    </table>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie – Training</p>
  </footer>

  <script>
    const gebruiker = JSON.parse(localStorage.getItem("loggedInUser"));

    const trainingsTypes = {
      licht: { boost: 1, kosten: 2, blessure: 1 },
      normaal: { boost: 3, kosten: 5, blessure: 5 },
      zwaar: { boost: 6, kosten: 10, blessure: 15 }
    };

    async function laadAtleten() {
      const { data: atleten } = await supabase
        .from("atleten")
        .select("*")
        .eq("owner", gebruiker.email);

      const tbody = document.getElementById("atletenTabel");
      tbody.innerHTML = "";

      atleten.forEach((a) => {
        const rij = document.createElement("tr");
        rij.innerHTML = `
          <td>${a.naam}</td>
          <td>${a.leeftijd}</td>
          <td>${a.sport}</td>
          <td>${a.onderdeel}</td>
          <td>${a.snelheid.toFixed(1)}</td>
          <td>${a.kracht.toFixed(1)}</td>
          <td>${a.techniek.toFixed(1)}</td>
          <td>
            <select id="keuze-${a.id}">
              <option value="licht">Licht</option>
              <option value="normaal" selected>Normaal</option>
              <option value="zwaar">Zwaar</option>
            </select>
          </td>
          <td><button onclick="trainAtleet('${a.id}')">Train</button></td>
        `;
        tbody.appendChild(rij);
      });
    }

    async function trainAtleet(id) {
      const select = document.getElementById(`keuze-${id}`);
      const type = trainingsTypes[select.value];

      const { data: atleten } = await supabase.from("atleten").select("*").eq("id", id);
      const atleet = atleten[0];

      const kans = Math.random() * 100;
      if (kans < type.blessure) {
        alert(`🚑 ${atleet.naam} raakte geblesseerd! Geen vooruitgang.`);
        return;
      }

      const updates = {
        snelheid: atleet.snelheid + Math.random() * type.boost,
        kracht: atleet.kracht + Math.random() * type.boost,
        techniek: atleet.techniek + Math.random() * type.boost
      };

      await supabase.from("atleten").update(updates).eq("id", id);

      // Trek MP af
      const nieuweMP = gebruiker.mp - type.kosten;
      gebruiker.mp = nieuweMP > 0 ? nieuweMP : 0;
      await supabase.from("users").update({ mp: gebruiker.mp }).eq("email", gebruiker.email);
      localStorage.setItem("loggedInUser", JSON.stringify(gebruiker));

      alert(`✅ ${atleet.naam} heeft getraind (${select.value})`);
      laadAtleten();
    }

    laadAtleten();
  </script>
</body>
</html>
