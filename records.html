<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi- en Nationale Records</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 8px;
      text-align: left;
      border: 1px solid #ccc;
    }
    th {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>
  <header>
    <h1>📈 Records Overzicht</h1>
    <nav><a href="index.html">⬅️ Terug naar Home</a></nav>
  </header>

  <main>
    <section>
      <h2>🌍 Multi Records (MR)</h2>
      <table>
        <thead>
          <tr><th>Sport & Onderdeel</th><th>Tijd</th></tr>
        </thead>
        <tbody id="mrTabel"></tbody>
      </table>
    </section>

    <section>
      <h2>🏳️ Nationale Records (NR)</h2>
      <table>
        <thead>
          <tr><th>Land</th><th>Sport & Onderdeel</th><th>Tijd</th></tr>
        </thead>
        <tbody id="nrTabel"></tbody>
      </table>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie – Records</p>
  </footer>

  <script>
    const mrData = JSON.parse(localStorage.getItem("records")) || {};
    const nrData = JSON.parse(localStorage.getItem("nationale_records")) || {};

    const mrTabel = document.getElementById("mrTabel");
    Object.entries(mrData).forEach(([onderdeel, tijd]) => {
      const row = document.createElement("tr");
      row.innerHTML = `<td>${onderdeel}</td><td>${tijd} sec</td>`;
      mrTabel.appendChild(row);
    });

    const nrTabel = document.getElementById("nrTabel");
    Object.entries(nrData).forEach(([key, tijd]) => {
      const [land, onderdeel] = key.split(" – ", 2);
      const rest = key.substring(land.length + 3);
      const row = document.createElement("tr");
      row.innerHTML = `<td>${land}</td><td>${rest}</td><td>${tijd} sec</td>`;
      nrTabel.appendChild(row);
    });
  </script>
</body>
</html>
