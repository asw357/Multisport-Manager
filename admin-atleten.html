<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Atletenbeheer - Multisport Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <h1>Atletenbeheer</h1>
        <nav>
            <ul>
                <li><a href="admin.html">Terug naar Admin</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Atleten Overzicht</h2>
            <input type="text" id="search-athlete" placeholder="Zoek op naam..." onkeyup="searchAthlete()">
            <button onclick="addAthlete()">Nieuwe Atleet Toevoegen</button>
            <table>
                <thead>
                    <tr>
                        <th>Naam</th>
                        <th>Sport</th>
                        <th>Onderdeel</th>
                        <th>Land</th>
                        <th>Leeftijd</th>
                        <th>Eigenschappen</th>
                        <th>Acties</th>
                    </tr>
                </thead>
                <tbody id="athlete-list">
                    <!-- Atleten worden hier geladen -->
                </tbody>
            </table>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            loadAthletes();
        });

        function loadAthletes() {
            let athletes = JSON.parse(localStorage.getItem("athletes")) || [];
            let athleteList = document.getElementById("athlete-list");
            athleteList.innerHTML = "";
            
            athletes.forEach((athlete, index) => {
                let row = document.createElement("tr");
                row.innerHTML = `
                    <td>${athlete.name}</td>
                    <td>${athlete.sport}</td>
                    <td>${athlete.event}</td>
                    <td>${athlete.country}</td>
                    <td>${athlete.age}</td>
                    <td>${athlete.attributes.map(attr => `${attr.name}: ${attr.value}`).join(", ")}</td>
                    <td>
                        <button onclick="editAthlete(${index})">Bewerken</button>
                        <button onclick="deleteAthlete(${index})">Verwijderen</button>
                    </td>
                `;
                athleteList.appendChild(row);
            });
        }

        function searchAthlete() {
            let input = document.getElementById("search-athlete").value.toLowerCase();
            let rows = document.querySelectorAll("#athlete-list tr");
            
            rows.forEach(row => {
                let name = row.cells[0].innerText.toLowerCase();
                row.style.display = name.includes(input) ? "" : "none";
            });
        }

        function addAthlete() {
            let name = prompt("Naam van de atleet:");
            let sport = prompt("Sport:");
            let event = prompt("Onderdeel:");
            let country = prompt("Land:");
            let age = parseInt(prompt("Leeftijd:"));
            
            if (name && sport && event && country && age) {
                let newAthlete = {
                    name,
                    sport,
                    event,
                    country,
                    age,
                    attributes: []
                };
                
                let athletes = JSON.parse(localStorage.getItem("athletes")) || [];
                athletes.push(newAthlete);
                localStorage.setItem("athletes", JSON.stringify(athletes));
                loadAthletes();
            }
        }

        function deleteAthlete(index) {
            if (confirm("Weet je zeker dat je deze atleet wilt verwijderen?")) {
                let athletes = JSON.parse(localStorage.getItem("athletes")) || [];
                athletes.splice(index, 1);
                localStorage.setItem("athletes", JSON.stringify(athletes));
                loadAthletes();
            }
        }

        function editAthlete(index) {
            let athletes = JSON.parse(localStorage.getItem("athletes")) || [];
            let athlete = athletes[index];
            
            let newAge = prompt("Nieuwe leeftijd:", athlete.age);
            if (newAge) athlete.age = parseInt(newAge);
            
            let newAttributes = prompt("Nieuwe eigenschappen (naam: waarde, gescheiden door komma's):", athlete.attributes.map(attr => `${attr.name}: ${attr.value}`).join(", "));
            if (newAttributes) {
                athlete.attributes = newAttributes.split(",").map(attr => {
                    let [name, value] = attr.split(":");
                    return { name: name.trim(), value: parseInt(value.trim()) };
                });
            }
            
            localStorage.setItem("athletes", JSON.stringify(athletes));
            loadAthletes();
        }
    </script>
</body>
</html>
