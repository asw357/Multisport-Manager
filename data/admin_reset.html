<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Admin – Testomgeving Reset</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { font-family: sans-serif; padding: 20px; }
    button { font-size: 18px; padding: 10px 20px; }
  </style>
</head>
<body>
  <h1>🧪 Reset Testomgeving</h1>
  <p>Gebruik de knop hieronder om alle data terug te zetten naar de testbasis.</p>
  <button onclick="resetTestData()">🔄 Refresh Testomgeving</button>

  <script>
    async function resetTestData() {
      const res = await fetch('data/test_seed.json');
      const data = await res.json();

      for (const key in data) {
        localStorage.setItem(key, JSON.stringify(data[key]));
      }

      alert("✅ Testomgeving is succesvol gereset!");
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
