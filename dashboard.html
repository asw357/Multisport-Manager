<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard – Multisport-Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Welkom bij jouw dashboard</h1>
    <div id="info">Laden...</div>
    <p><a href="index.html">Terug naar startpagina</a></p>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://bhpmdtivyripebburakf.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
    );

    const info = document.getElementById("info");

    async function loadUser() {
      const { data: sessionData, error: sessionError } = await supabase.auth.getSession();

      if (sessionError || !sessionData.session) {
        info.textContent = "Je bent niet ingelogd.";
        return;
      }

      const userId = sessionData.session.user.id;
      const { data: user, error: userError } = await supabase
        .from("users")
        .select("managernaam, land, is_admin")
        .eq("id", userId)
        .single();

      if (userError || !user) {
        info.textContent = "Gebruiker niet gevonden.";
        return;
      }

      info.innerHTML = `
        <p><strong>Managernaam:</strong> ${user.managernaam}</p>
        <p><strong>Land:</strong> ${user.land}</p>
        ${user.is_admin ? "<p><strong>👑 Jij bent admin</strong></p>" : ""}
      `;
    }

    loadUser();
  </script>
</body>
</html>
