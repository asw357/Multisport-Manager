<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎯 Wedstrijdtactieken</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    select, button {
      padding: 6px;
      margin: 5px 0;
    }
    .tactiek {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🎯 Wedstrijdtactieken</h1>
    <nav><a href="manager.html">⬅️ Terug naar Manager</a></nav>
  </header>

  <main>
    <label for="sportSelect">Kies sportonderdeel:</label>
    <select id="sportSelect"></select>

    <h2>Tactieken</h2>
    <div id="tactiekContainer">Laden...</div>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie – Tactieken</p>
  </footer>

  <script>
    const gebruiker = JSON.parse(localStorage.getItem("loggedInUser"));
    let sportonderdelen = [];

    async function laadSporten() {
      const { data } = await supabase.from("sportonderdelen").select("*");
      sportonderdelen = data;

      const select = document.getElementById("sportSelect");
      data.forEach(opt => {
        const optie = document.createElement("option");
        optie.value = JSON.stringify(opt);
        optie.textContent = `${opt.sport} – ${opt.geslacht} – ${opt.onderdeel}`;
        select.appendChild(optie);
      });

      select.addEventListener("change", toonTactieken);
    }

    async function toonTactieken() {
      const gekozen = JSON.parse(document.getElementById("sportSelect").value);
      const { data: tactieken } = await supabase
        .from("tactieken")
        .select("*")
        .eq("sport", gekozen.sport)
        .eq("onderdeel", gekozen.onderdeel);

      const container = document.getElementById("tactiekContainer");
      container.innerHTML = "";

      if (!tactieken.length) {
        container.innerHTML = "Geen tactieken gevonden.";
        return;
      }

      tactieken.forEach(t => {
        const div = document.createElement("div");
        div.className = "tactiek";
        div.innerHTML = `<strong>${t.tactiek}</strong><br><em>${t.effect}</em>`;
        container.appendChild(div);
      });
    }

    laadSporten();
  </script>
</body>
</html>
