<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📊 Beheer Statcategorieën</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 8px; border: 1px solid #ccc; }
    th { background: #eee; }
    input { width: 90%; padding: 4px; }
    button { padding: 6px 12px; margin: 6px 0; }
  </style>
</head>
<body>
  <h1>📊 Beheer Statcategorieën</h1>
  <nav><a href="admin.html">⬅️ Terug naar Admin</a></nav>

  <form id="statForm">
    <label for="sport">Sport</label>
    <input type="text" id="sport" required />
    <label for="geslacht">Geslacht</label>
    <input type="text" id="geslacht" required />
    <label for="onderdeel">Onderdeel</label>
    <input type="text" id="onderdeel" required />
    <label for="stat">Nieuwe Statnaam</label>
    <input type="text" id="stat" required />
    <button type="submit">➕ Toevoegen</button>
  </form>

  <table>
    <thead>
      <tr><th>Sport</th><th>Geslacht</th><th>Onderdeel</th><th>Statnaam</th><th>Actie</th></tr>
    </thead>
    <tbody id="statTabel"></tbody>
  </table>
  <script>
    async function laadStats() {
      const { data, error } = await supabase.from("statcategorieen").select("*").order("sport");
      const tbody = document.getElementById("statTabel");
      tbody.innerHTML = "";

      data.forEach((row) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.sport}</td>
          <td>${row.geslacht}</td>
          <td>${row.onderdeel}</td>
          <td>${row.stat}</td>
          <td><button onclick="verwijder(${row.id})">🗑️</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function verwijder(id) {
      if (!confirm("Weet je zeker dat je deze stat wilt verwijderen?")) return;
      await supabase.from("statcategorieen").delete().eq("id", id);
      laadStats();
    }

    document.getElementById("statForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const sport = document.getElementById("sport").value;
      const geslacht = document.getElementById("geslacht").value;
      const onderdeel = document.getElementById("onderdeel").value;
      const stat = document.getElementById("stat").value;

      await supabase.from("statcategorieen").insert([{ sport, geslacht, onderdeel, stat }]);
      e.target.reset();
      laadStats();
    });

    laadStats();
  </script>
</body>
</html>
