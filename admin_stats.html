<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚙️ Admin – Statcategorieën</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    form {
      max-width: 500px;
      margin-bottom: 30px;
    }
    input, select {
      width: 100%;
      padding: 6px;
      margin-top: 5px;
      margin-bottom: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 6px;
    }
    th {
      background-color: #f0f0f0;
    }
    button {
      padding: 6px 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1>⚙️ Admin – Statcategorieën</h1>
    <nav><a href="admin.html">⬅️ Terug naar Admin</a></nav>
  </header>

  <main>
    <form id="statForm">
      <label for="sport">Sport</label>
      <input type="text" id="sport" required />
      <label for="onderdeel">Onderdeel</label>
      <input type="text" id="onderdeel" required />
      <label for="stat">Statcategorie</label>
      <input type="text" id="stat" required />
      <button type="submit">➕ Toevoegen</button>
    </form>

    <h2>Huidige Statcategorieën</h2>
    <table>
      <thead>
        <tr>
          <th>Sport</th>
          <th>Onderdeel</th>
          <th>Stat</th>
          <th>Actie</th>
        </tr>
      </thead>
      <tbody id="statTabel"></tbody>
    </table>
  </main>

  <script>
    async function laadStats() {
      const { data } = await supabase.from("statcategorieen").select("*");
      const tbody = document.getElementById("statTabel");
      tbody.innerHTML = "";

      data.forEach(s => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${s.sport}</td>
          <td>${s.onderdeel}</td>
          <td>${s.stat}</td>
          <td><button onclick="verwijderStat('${s.id}')">🗑️</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function verwijderStat(id) {
      await supabase.from("statcategorieen").delete().eq("id", id);
      laadStats();
    }

    document.getElementById("statForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const entry = {
        sport: document.getElementById("sport").value,
        onderdeel: document.getElementById("onderdeel").value,
        stat: document.getElementById("stat").value
      };
      await supabase.from("statcategorieen").insert([entry]);
      this.reset();
      laadStats();
    });

    laadStats();
  </script>
</body>
</html>
