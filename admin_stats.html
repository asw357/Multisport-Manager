<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📊 Statcategorieën per Sportonderdeel</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    select, input, button {
      margin: 5px;
      padding: 6px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: left;
    }
    th {
      background-color: #f4f4f4;
    }
  </style>
</head>
<body>
  <header>
    <h1>📊 Statcategorieën per Sportonderdeel</h1>
    <nav><a href="admin.html">⬅️ Terug naar Admin</a></nav>
  </header>

  <main>
    <label for="onderdeelSelect">Onderdeel:</label>
    <select id="onderdeelSelect"></select>
    <input type="text" id="nieuweStat" placeholder="Nieuwe Statcategorie" />
    <button onclick="voegStatToe()">➕ Toevoegen</button>
    <table>
      <thead>
        <tr><th>Statcategorie</th><th>Verwijderen</th></tr>
      </thead>
      <tbody id="statsTabel"></tbody>
    </table>
  </main>
  <script>
    let alleOnderdelen = [];

    async function laadOnderdelen() {
      const { data, error } = await supabase
        .from("sportonderdelen")
        .select("*")
        .order("sport", { ascending: true });

      if (error) {
        alert("Fout bij laden sportonderdelen.");
        return;
      }

      alleOnderdelen = data;
      const select = document.getElementById("onderdeelSelect");
      select.innerHTML = "";

      data.forEach(o => {
        const optie = document.createElement("option");
        optie.value = o.id;
        optie.textContent = `${o.sport} - ${o.geslacht} - ${o.onderdeel}`;
        select.appendChild(optie);
      });

      if (data.length > 0) laadStatsVoorOnderdeel(data[0].id);
    }

    async function laadStatsVoorOnderdeel(onderdeelId) {
      const { data } = await supabase
        .from("stats")
        .select("*")
        .eq("onderdeel_id", onderdeelId)
        .order("naam");

      const tbody = document.getElementById("statsTabel");
      tbody.innerHTML = "";

      data.forEach(s => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${s.naam}</td>
                        <td><button onclick="verwijderStat(${s.id})">🗑️</button></td>`;
        tbody.appendChild(tr);
      });
    }

    document.getElementById("onderdeelSelect").addEventListener("change", e => {
      laadStatsVoorOnderdeel(e.target.value);
    });

    async function voegStatToe() {
      const naam = document.getElementById("nieuweStat").value.trim();
      const onderdeelId = document.getElementById("onderdeelSelect").value;
      if (!naam || !onderdeelId) return;

      const { error } = await supabase.from("stats").insert([{ naam, onderdeel_id: onderdeelId }]);
      if (error) return alert("Fout bij toevoegen statcategorie.");
      document.getElementById("nieuweStat").value = "";
      laadStatsVoorOnderdeel(onderdeelId);
    }

    async function verwijderStat(id) {
      await supabase.from("stats").delete().eq("id", id);
      laadStatsVoorOnderdeel(document.getElementById("onderdeelSelect").value);
    }

    laadOnderdelen();
  </script>
</body>
</html>
