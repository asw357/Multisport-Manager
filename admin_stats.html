<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📊 Statcategorieën Beheren</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .container {
      max-width: 800px;
      margin: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 8px;
      border: 1px solid #ccc;
      text-align: left;
    }
    th {
      background-color: #f0f0f0;
    }
    input, select, button {
      padding: 6px;
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 Statcategorieën per Sportonderdeel</h1>
    <nav><a href="admin.html">⬅️ Terug naar Admin</a></nav>

    <h3>➕ Nieuwe Stat toevoegen</h3>
    <form id="statForm">
      <label>Sport:</label>
      <select id="sportSelect"></select>

      <label>Geslacht:</label>
      <select id="geslachtSelect">
        <option value="Mannen">Mannen</option>
        <option value="Vrouwen">Vrouwen</option>
        <option value="Gemengd">Gemengd</option>
      </select>

      <label>Onderdeel:</label>
      <input type="text" id="onderdeelInput" required />

      <label>Statnaam:</label>
      <input type="text" id="statNaamInput" required />

      <button type="submit">➕ Toevoegen</button>
    </form>

    <h3>📋 Bestaande Stats</h3>
    <table id="statsTable">
      <thead>
        <tr><th>Sport</th><th>Geslacht</th><th>Onderdeel</th><th>Stat</th><th>Verwijderen</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <script>
    async function laadSporten() {
      const { data: sporten } = await supabase.from("sporten").select("*").order("sport");
      const select = document.getElementById("sportSelect");
      sporten.forEach(s => {
        const opt = document.createElement("option");
        opt.value = s.sport;
        opt.textContent = s.sport;
        select.appendChild(opt);
      });
    }

    async function laadStats() {
      const { data: stats } = await supabase.from("statcategorieen").select("*").order("sport");
      const tbody = document.querySelector("#statsTable tbody");
      tbody.innerHTML = "";
      stats.forEach(s => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${s.sport}</td>
          <td>${s.geslacht}</td>
          <td>${s.onderdeel}</td>
          <td>${s.stat}</td>
          <td><button onclick="verwijderStat(${s.id})">🗑️</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function verwijderStat(id) {
      if (!confirm("Weet je zeker dat je deze stat wilt verwijderen?")) return;
      await supabase.from("statcategorieen").delete().eq("id", id);
      laadStats();
    }

    document.getElementById("statForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const sport = document.getElementById("sportSelect").value;
      const geslacht = document.getElementById("geslachtSelect").value;
      const onderdeel = document.getElementById("onderdeelInput").value;
      const stat = document.getElementById("statNaamInput").value;

      await supabase.from("statcategorieen").insert([{ sport, geslacht, onderdeel, stat }]);
      document.getElementById("statForm").reset();
      laadStats();
    });

    laadSporten();
    laadStats();
  </script>
</body>
</html>
