<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Multisport Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Contact</h1>
        <nav>
            <ul>
                <li><a href="index.html">Terug naar Homepage</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Neem contact op</h2>
            <p>Heb je vragen of opmerkingen? Vul het onderstaande formulier in.</p>
            <form id="contact-form">
                <label for="name">Naam:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Bericht:</label>
                <textarea id="message" name="message" rows="4" required></textarea>

                <button type="submit">Verzenden</button>
            </form>
            <p id="response-message" style="color: green; display: none;">Je bericht is verzonden!</p>
        </section>
    </main>

    <script>
        document.getElementById("contact-form").addEventListener("submit", function(event) {
            event.preventDefault();
            document.getElementById("response-message").style.display = "block";
            this.reset();
        });
    </script>
</body>
</html>
