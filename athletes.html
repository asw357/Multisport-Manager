<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atletenbeheer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>🏃 Mijn Atleten</h1>
    <nav>
      <a href="manager.html">⬅️ Terug naar Manager</a>
    </nav>
  </header>

  <main>
    <input type="text" id="zoekInput" placeholder="🔎 Zoek op naam, sport of onderdeel" />
    <div id="atletenContainer"></div>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie</p>
  </footer>

  <script>
    const atleten = JSON.parse(localStorage.getItem("atleten")) || [];
    const user = JSON.parse(localStorage.getItem("loggedInUser"));
    const statCategorieen = JSON.parse(localStorage.getItem("statcategorieen")) || {};
    const container = document.getElementById("atletenContainer");
    const zoekInput = document.getElementById("zoekInput");

    function toonAtleten() {
      container.innerHTML = "";
      const zoekterm = zoekInput.value.toLowerCase();

      const eigenAtleten = atleten.filter(a => a.owner === user.email);
      const gefilterd = eigenAtleten.filter(a =>
        a.naam.toLowerCase().includes(zoekterm) ||
        a.sport?.toLowerCase().includes(zoekterm) ||
        a.onderdeel?.toLowerCase().includes(zoekterm)
      );

      if (gefilterd.length === 0) {
        container.innerHTML = "<p>Geen atleten gevonden.</p>";
        return;
      }

      gefilterd.forEach(a => {
        const div = document.createElement("div");
        div.className = "atleet-box";
        div.innerHTML = `
          <h3>${a.naam}</h3>
          <p><strong>Sport:</strong> ${a.sport}</p>
          <p><strong>Onderdeel:</strong> ${a.onderdeel || 'Onbekend'}</p>
          <p><strong>Leeftijd:</strong> ${a.leeftijd}</p>
          <div><strong>Stats:</strong></div>
          <ul id="stats-${a.id}"></ul>
          <p>
            <a href="training.html?id=${a.id}">🏋️ Train</a> |
            <a href="scouting.html">🔍 Scout</a> |
            <button onclick="ontslaAtleet('${a.id}')">❌ Ontsla</button>
          </p>
        `;
        container.appendChild(div);

        // Stats tonen
        const statList = document.getElementById(`stats-${a.id}`);
        const sleutel = `${a.sport} - ${a.geslacht || "Mannen"} - ${a.onderdeel}`;
        const statNamen = statCategorieen[sleutel] || Object.keys(a.stats || {});

        statNamen.forEach(stat => {
          const li = document.createElement("li");
          const waarde = a.stats && a.stats[stat] !== undefined ? a.stats[stat] : '–';
          li.textContent = `${stat}: ${waarde}`;
          statList.appendChild(li);
        });
      });
    }

    zoekInput.addEventListener("input", toonAtleten);
    toonAtleten();

    function ontslaAtleet(id) {
      if (!confirm("Weet je zeker dat je deze atleet wilt ontslaan?")) return;
      const index = atleten.findIndex(a => a.id === id);
      if (index > -1) {
        atleten.splice(index, 1);
        localStorage.setItem("atleten", JSON.stringify(atleten));
        toonAtleten();
      }
    }
  </script>
</body>
</html>
