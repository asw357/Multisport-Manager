<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mijn Atleten</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ccc;
    }
    th {
      background: #f4f4f4;
    }
  </style>
</head>
<body>
  <header>
    <h1>🏃 Mijn Atleten</h1>
    <nav><a href="manager.html">⬅️ Terug naar Manager</a></nav>
  </header>

  <main>
    <table>
      <thead>
        <tr>
          <th>Naam</th>
          <th>Leeftijd</th>
          <th>Sport</th>
          <th>Discipline</th>
          <th>Geslacht</th>
          <th>Onderdeel</th>
          <th>Snelheid</th>
          <th>Kracht</th>
          <th>Techniek</th>
        </tr>
      </thead>
      <tbody id="atletenTabel">
        <tr><td colspan="9">Laden...</td></tr>
      </tbody>
    </table>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie – Atleten</p>
  </footer>

  <script>
    async function laadAtleten() {
      const gebruiker = JSON.parse(localStorage.getItem("loggedInUser"));
      if (!gebruiker) {
        alert("Niet ingelogd.");
        window.location.href = "login.html";
        return;
      }

      const { data: atleten, error } = await supabase
        .from("atleten")
        .select("*")
        .eq("owner", gebruiker.email);

      const tbody = document.getElementById("atletenTabel");
      tbody.innerHTML = "";

      if (error || !atleten || atleten.length === 0) {
        tbody.innerHTML = "<tr><td colspan='9'>Geen atleten gevonden.</td></tr>";
        return;
      }

      for (let a of atleten) {
        const rij = document.createElement("tr");
        rij.innerHTML = `
          <td>${a.naam}</td>
          <td>${a.leeftijd}</td>
          <td>${a.sport}</td>
          <td>${a.discipline || ""}</td>
          <td>${a.geslacht}</td>
          <td>${a.onderdeel}</td>
          <td>${a.snelheid.toFixed(1)}</td>
          <td>${a.kracht.toFixed(1)}</td>
          <td>${a.techniek.toFixed(1)}</td>
        `;
        tbody.appendChild(rij);
      }
    }

    laadAtleten();
  </script>
</body>
</html>
