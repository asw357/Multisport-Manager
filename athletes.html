<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atletenbeheer</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .container { max-width: 900px; margin: auto; }
    .zoekveld { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f2f2f2; }
  </style>
</head>
<body>
  <header>
    <h1>🏃 Atletenbeheer</h1>
    <nav><a href="manager.html">⬅️ Terug naar Manager Home</a></nav>
  </header>

  <main class="container">
    <input type="text" id="zoekInput" class="zoekveld" placeholder="Zoek op naam, sport of onderdeel...">
    <table>
      <thead>
        <tr>
          <th>Naam</th>
          <th>Sport</th>
          <th>Leeftijd</th>
          <th>Onderdeel</th>
          <th>Acties</th>
        </tr>
      </thead>
      <tbody id="atletenTabel"></tbody>
    </table>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie</p>
  </footer>

  <script>
    const gebruiker = JSON.parse(localStorage.getItem("loggedInUser")) || {};
    const atleten = JSON.parse(localStorage.getItem("atleten")) || [];
    const mijnAtleten = atleten.filter(a => a.owner === gebruiker.email);

    function renderAtleten(filter = "") {
      const body = document.getElementById("atletenTabel");
      body.innerHTML = "";
      mijnAtleten.forEach(a => {
        const zoektekst = `${a.naam} ${a.sport} ${a.onderdeel}`.toLowerCase();
        if (zoektekst.includes(filter.toLowerCase())) {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${a.naam}</td>
            <td>${a.sport}</td>
            <td>${a.leeftijd}</td>
            <td>${a.onderdeel}</td>
            <td>
              <a href="training.html?id=${a.id}">🏋️ Train</a> |
              <a href="scouten.html">🔍 Scout</a>
            </td>
          `;
          body.appendChild(row);
        }
      });
    }

    document.getElementById("zoekInput").addEventListener("input", e => renderAtleten(e.target.value));
    renderAtleten();
  </script>
</body>
</html>
