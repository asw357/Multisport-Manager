<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👥 Mijn Atleten</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .groep {
      margin-bottom: 30px;
    }
    .groep h3 {
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
    }
    .atleet {
      margin: 4px 0;
      padding: 6px;
      background: #f0f0f0;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <header>
    <h1>👥 Mijn Atleten</h1>
    <nav><a href="manager.html">⬅️ Terug naar Manager</a></nav>
  </header>

  <main>
    <div id="atletenContainer">🔄 Laden...</div>
  </main>
  <script>
    async function laadAtleten() {
      const gebruiker = JSON.parse(localStorage.getItem("loggedInUser"));
      if (!gebruiker) {
        window.location.href = "login.html";
        return;
      }

      const { data: atleten, error } = await supabase
        .from("atleten")
        .select("*")
        .eq("owner", gebruiker.email);

      if (error || !atleten) {
        document.getElementById("atletenContainer").innerText = "❌ Atleten laden mislukt.";
        return;
      }

      const groepen = {};
      atleten.forEach(a => {
        const sleutel = `${a.sport} – ${a.geslacht}`;
        if (!groepen[sleutel]) groepen[sleutel] = [];
        groepen[sleutel].push(a);
      });

      const container = document.getElementById("atletenContainer");
      container.innerHTML = "";

      Object.keys(groepen).sort().forEach(groepNaam => {
        const div = document.createElement("div");
        div.className = "groep";
        div.innerHTML = `<h3>${groepNaam}</h3>`;
        groepen[groepNaam].forEach(a => {
          div.innerHTML += `
            <div class="atleet">
              <strong>${a.naam}</strong> (${a.onderdeel}) – ${a.leeftijd} jaar
            </div>
          `;
        });
        container.appendChild(div);
      });
    }

    laadAtleten();
  </script>
</body>
</html>
