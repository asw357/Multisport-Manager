<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👥 Atletenbeheer</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .atleet-blok {
      background: #f4f4f4;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .kop {
      font-weight: bold;
      margin-bottom: 6px;
    }
    .linkbox {
      margin-top: 20px;
    }
    .linkbox a {
      margin-right: 12px;
    }
  </style>
</head>
<body>
  <header>
    <h1>👥 Mijn Atleten</h1>
    <nav><a href="manager.html">⬅️ Terug naar Manager</a></nav>
  </header>

  <main>
    <div id="atletenContainer">🔄 Atleten laden...</div>

    <div class="linkbox">
      <a href="training.html">🏋️ Naar Training</a>
      <a href="scouting.html">🔍 Naar Scouten</a>
    </div>
  </main>
  <script>
    async function laadAtleten() {
      const user = JSON.parse(localStorage.getItem("loggedInUser"));
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const { data: atleten } = await supabase
        .from("atleten")
        .select("*")
        .eq("owner", user.email)
        .order("sport", { ascending: true });

      const container = document.getElementById("atletenContainer");
      container.innerHTML = "";

      if (!atleten || atleten.length === 0) {
        container.innerHTML = "📭 Geen atleten gevonden.";
        return;
      }

      const gegroepeerd = {};
      atleten.forEach(a => {
        const sleutel = `${a.sport} - ${a.geslacht}`;
        if (!gegroepeerd[sleutel]) gegroepeerd[sleutel] = [];
        gegroepeerd[sleutel].push(a);
      });

      for (const sleutel in gegroepeerd) {
        const sectie = document.createElement("div");
        sectie.innerHTML = `<h2>${sleutel}</h2>`;
        gegroepeerd[sleutel].forEach(a => {
          const div = document.createElement("div");
          div.className = "atleet-blok";
          div.innerHTML = `
            <div class="kop">${a.naam} (${a.leeftijd} jaar) – ${a.onderdeel}</div>
            🏃‍♂️ Snelheid: ${a.stats?.snelheid?.toFixed(1) || 0} | 💪 Kracht: ${a.stats?.kracht?.toFixed(1) || 0} | 🧠 Techniek: ${a.stats?.techniek?.toFixed(1) || 0}
          `;
          sectie.appendChild(div);
        });
        container.appendChild(sectie);
      }
    }

    laadAtleten();
  </script>
</body>
</html>
