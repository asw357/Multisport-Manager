<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📋 Admin – Wedstrijdschema Maken</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    form, table { max-width: 800px; margin: auto; }
    input, select {
      width: 100%;
      padding: 6px;
      margin: 5px 0;
    }
    button {
      padding: 8px 12px;
      margin-top: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 6px;
    }
    th {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>
  <header>
    <h1>📋 Admin – Wedstrijdschema Maken</h1>
    <nav><a href="admin.html">⬅️ Terug naar Admin</a></nav>
  </header>

  <main>
    <form id="schemaForm">
      <label for="editie_id">Editie</label>
      <select id="editie_id" required></select>

      <label for="dag">Dag (bijv. 1)</label>
      <input type="number" id="dag" required />

      <label for="tijd">Tijdstip</label>
      <input type="time" id="tijd" required />

      <label for="ronde_id">Ronde</label>
      <select id="ronde_id" required></select>

      <label for="status">Status</label>
      <select id="status">
        <option value="gepland">Gepland</option>
        <option value="bezig">Bezig</option>
        <option value="afgerond">Afgerond</option>
      </select>

      <label for="extra_info">Extra info (optioneel)</label>
      <input type="text" id="extra_info" />

      <button type="submit">➕ Toevoegen aan Schema</button>
    </form>

    <h2>📅 Ingevoerde Schema-items</h2>
    <table>
      <thead>
        <tr>
          <th>Editie</th>
          <th>Dag</th>
          <th>Tijd</th>
          <th>Ronde</th>
          <th>Sport</th>
          <th>Onderdeel</th>
          <th>Geslacht</th>
          <th>Status</th>
          <th>Actie</th>
        </tr>
      </thead>
      <tbody id="schemaTabel"></tbody>
    </table>
  </main>

  <script>
    let rondeData = {};
    let editieNamen = {};

    async function laadDropdowns() {
      const { data: edities } = await supabase
        .from("edities")
        .select("id, naam, status")
        .eq("status", "gepland")
        .order("startdatum");

      const editieSelect = document.getElementById("editie_id");
      edities?.forEach(e => {
        editieNamen[e.id] = e.naam;
        const option = document.createElement("option");
        option.value = e.id;
        option.textContent = e.naam;
        editieSelect.appendChild(option);
      });

      const { data: rondes } = await supabase
        .from("rondes")
        .select("id, ronde, sport, onderdeel, geslacht")
        .order("volgorde");

      const rondeSelect = document.getElementById("ronde_id");
      rondes?.forEach(r => {
        rondeData[r.id] = r;
        const label = `${r.ronde} – ${r.sport} ${r.onderdeel} (${r.geslacht})`;
        const option = document.createElement("option");
        option.value = r.id;
        option.textContent = label;
        rondeSelect.appendChild(option);
      });
    }
    async function laadSchema() {
      const { data } = await supabase.from("schema").select("*").order("dag, tijd");
      const tbody = document.getElementById("schemaTabel");
      tbody.innerHTML = "";

      data?.forEach(item => {
        const r = rondeData[item.ronde_id] || {};
        const rij = document.createElement("tr");
        rij.innerHTML = `
          <td>${editieNamen[item.editie_id] || item.editie_id}</td>
          <td>${item.dag}</td>
          <td>${item.tijd}</td>
          <td>${r.ronde || "-"}</td>
          <td>${r.sport || "-"}</td>
          <td>${r.onderdeel || "-"}</td>
          <td>${r.geslacht || "-"}</td>
          <td>${item.status || "-"}</td>
          <td><button onclick="verwijderSchema('${item.id}')">🗑️</button></td>
        `;
        tbody.appendChild(rij);
      });
    }

    async function verwijderSchema(id) {
      await supabase.from("schema").delete().eq("id", id);
      laadSchema();
    }

    document.getElementById("schemaForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const nieuwe = {
        editie_id: document.getElementById("editie_id").value,
        dag: parseInt(document.getElementById("dag").value),
        tijd: document.getElementById("tijd").value,
        ronde_id: document.getElementById("ronde_id").value,
        status: document.getElementById("status").value,
        extra_info: document.getElementById("extra_info").value || null
      };
      const { error } = await supabase.from("schema").insert([nieuwe]);
      if (error) {
        alert("❌ Fout bij opslaan");
      } else {
        this.reset();
        laadSchema();
      }
    });

    laadDropdowns();
    laadSchema();
  </script>
</body>
</html>
