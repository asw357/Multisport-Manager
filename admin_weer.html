<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weersinstellingen</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>⛅ Weersinstellingen</h1>
    <nav>
      <ul>
        <li><a href="admin.html">⬅️ Terug naar Admin Dashboard</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <p>Schakel hier in of wedstrijden beïnvloed mogen worden door weer (bijv. wind, regen, etc.)</p>
      <label>
        <input type="checkbox" id="weatherToggle">
        Weersinvloeden activeren
      </label>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie – Weerbeheer</p>
  </footer>

  <script>
    const ADMIN_EMAIL = "wilcoboesveld12@hotmail.com";
    const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
    if (!loggedInUser || loggedInUser.email !== ADMIN_EMAIL) {
      alert("Toegang geweigerd.");
      window.location.href = "index.html";
    }

    const toggle = document.getElementById("weatherToggle");

    toggle.addEventListener("change", () => {
      localStorage.setItem("weerActief", toggle.checked);
    });

    document.addEventListener("DOMContentLoaded", () => {
      const status = localStorage.getItem("weerActief");
      toggle.checked = status === "true";
    });
  </script>
</body>
</html>
