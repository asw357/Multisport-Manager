<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚙️ Admin – Tactieken Beheren</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    form, table {
      max-width: 800px;
      margin: 20px auto;
    }
    input, select, textarea {
      width: 100%;
      margin-top: 5px;
      margin-bottom: 10px;
      padding: 6px;
    }
    button {
      padding: 8px 12px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }
    th {
      background: #eee;
    }
  </style>
</head>
<body>
  <header>
    <h1>⚙️ Admin – Tactieken Beheren</h1>
    <nav><a href="admin.html">⬅️ Terug naar Admin</a></nav>
  </header>

  <main>
    <form id="tactiekForm">
      <label for="sport">Sport</label>
      <input type="text" id="sport" required />
      <label for="onderdeel">Onderdeel</label>
      <input type="text" id="onderdeel" required />
      <label for="tactiek">Tactieknaam</label>
      <input type="text" id="tactiek" required />
      <label for="effect">Effect / Beschrijving</label>
      <textarea id="effect" rows="2" required></textarea>
      <button type="submit">➕ Tactiek toevoegen</button>
    </form>

    <h2>Bestaande Tactieken</h2>
    <table id="tactiekTabel">
      <thead>
        <tr>
          <th>Sport</th>
          <th>Onderdeel</th>
          <th>Tactiek</th>
          <th>Effect</th>
          <th>Actie</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <script>
    async function laadTactieken() {
      const { data } = await supabase.from("tactieken").select("*");
      const tbody = document.querySelector("#tactiekTabel tbody");
      tbody.innerHTML = "";

      data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.sport}</td>
          <td>${row.onderdeel}</td>
          <td>${row.tactiek}</td>
          <td>${row.effect}</td>
          <td><button onclick="verwijderTactiek('${row.id}')">🗑️ Verwijder</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function verwijderTactiek(id) {
      await supabase.from("tactieken").delete().eq("id", id);
      laadTactieken();
    }

    document.getElementById("tactiekForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const tactiek = {
        sport: document.getElementById("sport").value,
        onderdeel: document.getElementById("onderdeel").value,
        tactiek: document.getElementById("tactiek").value,
        effect: document.getElementById("effect").value
      };

      await supabase.from("tactieken").insert([tactiek]);
      this.reset();
      laadTactieken();
    });

    laadTactieken();
  </script>
</body>
</html>
