<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="login-title">Inloggen – Multisport-Manager</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="language.js"></script>
</head>
<body>
  <header>
    <h1 data-i18n="login-heading">🔐 Inloggen</h1>
    <nav>
      <a href="index.html" data-i18n="back-home">⬅️ Terug naar Home</a>
    </nav>
    <div id="taalkeuze"></div>
  </header>

  <main>
    <form id="loginForm">
      <label for="email" data-i18n="email">E-mailadres:</label><br/>
      <input type="email" id="email" required /><br/>

      <label for="password" data-i18n="password">Wachtwoord:</label><br/>
      <input type="password" id="password" required /><br/>

      <button type="submit" data-i18n="login-button">Inloggen</button>
    </form>
    <p id="melding" style="color: red;"></p>
  </main>

  <footer>
    <p data-i18n="footer">&copy; 2025 Multisport-Manager – Jouw sport, jouw strategie.</p>
  </footer>
  <script>
    // 🌐 Taalkeuze
    const taalDiv = document.getElementById("taalkeuze");
    const talen = ["nl", "en", "fr", "de"];
    const actieveTaal = localStorage.getItem("taal") || "nl";

    talen.forEach(taal => {
      const knop = document.createElement("button");
      knop.textContent = taal.toUpperCase();
      knop.style.marginRight = "5px";
      if (taal === actieveTaal) knop.disabled = true;
      knop.addEventListener("click", () => {
        localStorage.setItem("taal", taal);
        location.reload();
      });
      taalDiv.appendChild(knop);
    });

    if (typeof vertaalPagina === "function") {
      vertaalPagina();
    }

    // 🔐 Inloggen
    const loginForm = document.getElementById("loginForm");
    const melding = document.getElementById("melding");

    loginForm.addEventListener("submit", e => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;

      const accounts = JSON.parse(localStorage.getItem("accounts")) || [];
      const account = accounts.find(acc => acc.email === email && acc.wachtwoord === password);

      if (!account) {
        melding.textContent = "Foutieve inloggegevens.";
        return;
      }

      localStorage.setItem("user", JSON.stringify(account));

      // ✅ Geen admin-redirect meer, gewoon terug naar homepage
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
