<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inloggen – Multisport-Manager</title>
  <link rel="stylesheet" href="style.css" />
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const supabase = createClient(
      "https://bhpmdtivyripebburakf.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJocG1kdGl2eXJpcGViYnVyYWtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM2Mjc4NzYsImV4cCI6MjA2OTIwMzg3Nn0.kb733XLzUnc-aTbW_RzpeVJqylZ608egVShDCgIJkKI"
    );

    window.supabase = supabase;
  </script>
</head>
<body>
  <p><a href="index.html">← Terug naar homepagina</a></p>
  <main>
    <h1>Inloggen</h1>

    <form id="loginForm">
      <label for="email">E-mailadres:</label>
      <input type="email" id="email" required />

      <label for="password">Wachtwoord:</label>
      <input type="password" id="password" required />

      <button type="submit">Inloggen</button>
    </form>

    <p id="melding" style="color:red;"></p>
  </main>

  <script type="module">
    const form = document.getElementById("loginForm");
    const melding = document.getElementById("melding");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();

      melding.textContent = "";

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        console.error("Login fout:", error);
        melding.textContent = "Inloggen mislukt: " + error.message;
        return;
      }

      const userId = data.user.id;
      console.log("Ingelogd als user ID:", userId);

      // Eerst proberen op id
      let { data: userData, error: userError } = await supabase
        .from("users")
        .select("*")
        .eq("id", userId)
        .maybeSingle();

      if (!userData || userError) {
        console.warn("Niet gevonden op ID, probeer e-mail. Fout:", userError);

        // Fallback: zoek via email
        const fallback = await supabase
          .from("users")
          .select("*")
          .eq("email", email)
          .maybeSingle();

        if (fallback.data) {
          console.log("Gebruiker gevonden via email:", fallback.data);
          window.location.href = "dashboard.html";
        } else {
          console.error("Gebruiker niet gevonden:", fallback.error);
          melding.textContent = "Gebruiker niet gevonden.";
        }
      } else {
        console.log("Gebruiker gevonden via ID:", userData);
        window.location.href = "dashboard.html";
      }
    });
  </script>
</body>
</html>
