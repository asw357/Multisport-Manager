<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inloggen</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    form {
      max-width: 400px;
      margin: auto;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 8px;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }
    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>🔐 Inloggen</h1>
    <nav><a href="index.html">⬅️ Terug naar Home</a></nav>
  </header>

  <main>
    <form id="loginForm">
      <label for="email">E-mailadres</label>
      <input type="email" id="email" required />

      <label for="wachtwoord">Wachtwoord</label>
      <input type="password" id="wachtwoord" required />

      <button type="submit">➡️ Inloggen</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie – Inloggen</p>
  </footer>

  <script>
    async function fetchJSON(path) {
      const res = await fetch(path);
      return await res.json();
    }

    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const wachtwoord = document.getElementById("wachtwoord").value;

      const users = await fetchJSON("data/users.json");
      const match = users.find(u => u.email === email && u.wachtwoord === wachtwoord);

      if (!match) {
        alert("❌ Foutieve inloggegevens.");
        return;
      }

      localStorage.setItem("loggedInUser", JSON.stringify(match));
      window.location.href = "manager.html";
    });
  </script>
</body>
</html>
