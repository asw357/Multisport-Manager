<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inloggen</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    form {
      max-width: 400px;
      margin: auto;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 8px;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }
    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>🔐 Inloggen</h1>
    <nav><a href="index.html">⬅️ Terug naar Home</a></nav>
  </header>

  <main>
    <form id="loginForm">
      <label for="email">E-mailadres</label>
      <input type="email" id="email" required />

      <label for="wachtwoord">Wachtwoord</label>
      <input type="password" id="wachtwoord" required />

      <button type="submit">➡️ Inloggen</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie – Inloggen</p>
  </footer>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const wachtwoord = document.getElementById("wachtwoord").value;

      const { data: users, error } = await supabase
        .from("users")
        .select("*")
        .eq("email", email)
        .eq("wachtwoord", wachtwoord);

      if (error || !users || users.length === 0) {
        alert("❌ Foutieve inloggegevens.");
        return;
      }

      localStorage.setItem("loggedInUser", JSON.stringify(users[0]));
      window.location.href = "manager.html";
    });
  </script>
</body>
</html>
