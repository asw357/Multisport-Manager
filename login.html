<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Multisport Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <h1>Inloggen</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="register.html">Registreren</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Log in op je account</h2>
            <form id="login-form">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="password">Wachtwoord:</label>
                <input type="password" id="password" name="password" required>
                
                <button type="submit">Inloggen</button>
            </form>
        </section>
    </main>

    <script>
        document.getElementById("login-form").addEventListener("submit", function(event) {
            event.preventDefault();
            let users = JSON.parse(localStorage.getItem("users")) || [];
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;
            
            let user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                localStorage.setItem("loggedInUser", JSON.stringify(user));
                alert("Inloggen geslaagd! Je wordt doorgestuurd naar de managerpagina.");
                window.location.href = "manager.html";
            } else {
                alert("Onjuiste e-mail of wachtwoord. Probeer het opnieuw.");
            }
        });
    </script>
</body>
</html>
