<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedstrijdbeheer - Multisport Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <h1>Wedstrijdbeheer</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="manager.html">Manager Pagina</a></li>
                <li><a href="admin.html">Admin Panel</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Bewerk Wedstrijden per Editie</h2>
            <p>Selecteer een editie om het schema te beheren.</p>
            <label for="editie-select">Kies een Editie:</label>
            <select id="editie-select" onchange="loadSchedule()">
                <!-- Dynamisch geladen edities -->
            </select>
        </section>
        
        <section>
            <h2>Wedstrijdschema</h2>
            <table>
                <thead>
                    <tr>
                        <th>Dag</th>
                        <th>Tijd</th>
                        <th>Sport</th>
                        <th>Onderdeel</th>
                        <th>Locatie</th>
                        <th>Acties</th>
                    </tr>
                </thead>
                <tbody id="schedule-list">
                    <!-- Dynamisch geladen wedstrijden -->
                </tbody>
            </table>
        </section>

        <section>
            <h2>Wedstrijd Toevoegen</h2>
            <form id="add-match-form">
                <label for="day">Dag:</label>
                <input type="number" id="day" name="day" required>

                <label for="time">Tijd:</label>
                <input type="time" id="time" name="time" required>

                <label for="sport">Sport:</label>
                <input type="text" id="sport" name="sport" required>

                <label for="event">Onderdeel:</label>
                <input type="text" id="event" name="event" required>

                <label for="location">Locatie:</label>
                <input type="text" id="location" name="location" required>

                <button type="submit">➕ Toevoegen</button>
            </form>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            loadEditions();
        });

        function loadEditions() {
            fetch('https://your-project.replit.app/editions')
                .then(response => response.json())
                .then(editions => {
                    const select = document.getElementById("editie-select");
                    select.innerHTML = "";
                    editions.forEach(edition => {
                        const option = document.createElement("option");
                        option.value = edition.id;
                        option.textContent = edition.name;
                        select.appendChild(option);
                    });
                    if (editions.length > 0) {
                        loadSchedule();
                    }
                })
                .catch(error => console.error("Fout bij laden edities:", error));
        }

        function loadSchedule() {
            const editionId = document.getElementById("editie-select").value;
            if (!editionId) return;
            fetch(`https://your-project.replit.app/schedule/${editionId}`)
                .then(response => response.json())
                .then(schedule => {
                    const tbody = document.getElementById("schedule-list");
                    tbody.innerHTML = "";
                    schedule.forEach(match => {
                        let row = document.createElement("tr");
                        row.innerHTML = `
                            <td>${match.day}</td>
                            <td>${match.time}</td>
                            <td>${match.sport}</td>
                            <td>${match.event}</td>
                            <td>${match.location}</td>
                            <td>
                                <button onclick="deleteMatch(${match.id})">🗑️ Verwijderen</button>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                })
                .catch(error => console.error("Fout bij laden schema:", error));
        }
        function deleteMatch(matchId) {
            if (confirm("Weet je zeker dat je deze wedstrijd wilt verwijderen?")) {
                fetch(`https://your-project.replit.app/schedule/${matchId}`, { method: "DELETE" })
                    .then(response => response.json())
                    .then(() => {
                        loadSchedule();
                    })
                    .catch(error => alert("Fout bij verwijderen: " + error));
            }
        }

        document.getElementById("add-match-form").addEventListener("submit", function(event) {
            event.preventDefault();
            const editionId = document.getElementById("editie-select").value;
            const matchData = {
                day: document.getElementById("day").value,
                time: document.getElementById("time").value,
                sport: document.getElementById("sport").value,
                event: document.getElementById("event").value,
                location: document.getElementById("location").value
            };

            fetch(`https://your-project.replit.app/schedule/${editionId}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(matchData)
            })
            .then(response => response.json())
            .then(() => {
                document.getElementById("add-match-form").reset();
                loadSchedule();
            })
            .catch(error => alert("Fout bij toevoegen: " + error));
        });
    </script>
</body>
</html>
