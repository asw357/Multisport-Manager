<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedstrijdbeheer - Multisport Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <h1>Wedstrijdbeheer</h1>
        <nav>
            <ul>
                <li><a href="admin.html">Terug naar Admin</a></li>
                <li><a href="index.html">Home</a></li>
                <li><a href="manager.html">Manager Pagina</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Selecteer een Editie</h2>
            <label for="editieSelect">Kies een editie:</label>
            <select id="editieSelect" onchange="loadEditionSchedule()">
                <!-- Dynamisch geladen edities -->
            </select>
        </section>
        
        <section id="wedstrijdschema">
            <h2>Wedstrijdschema</h2>
            <button onclick="addMatch()">➕ Voeg een wedstrijd toe</button>
            <table>
                <thead>
                    <tr>
                        <th>Dag</th>
                        <th>Tijd</th>
                        <th>Sport</th>
                        <th>Onderdeel</th>
                        <th>Ronde</th>
                        <th>Locatie</th>
                        <th>Acties</th>
                    </tr>
                </thead>
                <tbody id="scheduleTable">
                    <!-- Dynamisch geladen schema -->
                </tbody>
            </table>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            loadEditions();
        });

        function loadEditions() {
            fetch('http://localhost:3000/editions')
                .then(response => response.json())
                .then(editions => {
                    let select = document.getElementById("editieSelect");
                    editions.forEach(edition => {
                        let option = document.createElement("option");
                        option.value = edition.id;
                        option.textContent = edition.name;
                        select.appendChild(option);
                    });
                })
                .catch(error => console.error("Fout bij laden van edities:", error));
        }

        function loadEditionSchedule() {
            let editionId = document.getElementById("editieSelect").value;
            fetch(`http://localhost:3000/schedule/${editionId}`)
                .then(response => response.json())
                .then(schedule => {
                    let table = document.getElementById("scheduleTable");
                    table.innerHTML = "";
                    schedule.forEach(match => {
                        let row = document.createElement("tr");
                        row.innerHTML = `
                            <td>${match.day}</td>
                            <td>${match.time}</td>
                            <td>${match.sport}</td>
                            <td>${match.event}</td>
                            <td>${match.round}</td>
                            <td>${match.location}</td>
                            <td><button onclick="deleteMatch(${match.id})">❌ Verwijder</button></td>
                        `;
                        table.appendChild(row);
                    });
                })
                .catch(error => console.error("Fout bij laden van schema:", error));
        }

        function addMatch() {
            let editionId = document.getElementById("editieSelect").value;
            let newMatch = {
                day: prompt("Dag nummer:"),
                time: prompt("Tijd (hh:mm):"),
                sport: prompt("Sport:"),
                event: prompt("Onderdeel:"),
                round: prompt("Ronde:"),
                location: prompt("Locatie:")
            };

            fetch(`http://localhost:3000/schedule/${editionId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newMatch)
            })
            .then(response => response.json())
            .then(() => loadEditionSchedule())
            .catch(error => console.error("Fout bij toevoegen van wedstrijd:", error));
        }
    </script>
</body>
</html>
