<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedstrijdbeheer - Multisport Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <h1>Wedstrijdbeheer</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="manager.html">Manager Pagina</a></li>
                <li><a href="admin.html">Admin Panel</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Bewerk Wedstrijden per Editie</h2>
            <p>Selecteer een editie om het schema te beheren.</p>
            <label for="editie-select">Kies een Editie:</label>
            <select id="editie-select" onchange="loadSchedule()">
                <!-- Dynamisch geladen edities -->
            </select>
        </section>
        
        <section>
            <h2>Wedstrijdschema</h2>
            <table>
                <thead>
                    <tr>
                        <th>Dag</th>
                        <th>Tijd</th>
                        <th>Sport</th>
                        <th>Onderdeel</th>
                        <th>Locatie</th>
                        <th>Acties</th>
                    </tr>
                </thead>
                <tbody id="schedule-list">
                    <!-- Dynamisch geladen wedstrijden -->
                </tbody>
            </table>
        </section>

        <section>
            <h2>Wedstrijd Toevoegen</h2>
            <form id="add-match-form">
                <label for="day">Dag:</label>
                <input type="number" id="day" name="day" required>

                <label for="time">Tijd:</label>
                <input type="time" id="time" name="time" required>

                <label for="sport">Sport:</label>
                <input type="text" id="sport" name="sport" required>

                <label for="event">Onderdeel:</label>
                <input type="text" id="event" name="event" required>

                <label for="location">Locatie:</label>
                <input type="text" id="location" name="location" required>

                <button type="submit">➕ Toevoegen</button>
            </form>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            loadEditions();
        });

        function loadEditions() {
            const editions = [
                "Zomer Editie 1: Athene (Griekenland)", "Zomer Editie 2: Parijs (Frankrijk)", "Zomer Editie 3: St. Louis (Verenigde Staten)",
                "Zomer Editie 4: Londen (Verenigd Koninkrijk)", "Zomer Editie 5: Stockholm (Zweden)", "Zomer Editie 6: Antwerpen (België)",
                "Zomer Editie 7: Parijs (Frankrijk)", "Zomer Editie 8: Amsterdam (Nederland)", "Zomer Editie 9: Los Angeles (Verenigde Staten)",
                "Zomer Editie 10: Berlijn (Duitsland)", "Zomer Editie 11: Londen (Verenigd Koninkrijk)", "Zomer Editie 12: Helsinki (Finland)",
                "Zomer Editie 13: Melbourne (Australië)", "Zomer Editie 14: Rome (Italië)", "Zomer Editie 15: Tokio (Japan)",
                "Zomer Editie 16: Mexico-Stad (Mexico)", "Zomer Editie 17: München (Duitsland)", "Zomer Editie 18: Montreal (Canada)",
                "Zomer Editie 19: Moskou (Rusland)", "Zomer Editie 20: Los Angeles (Verenigde Staten)", "Zomer Editie 21: Seoel (Zuid-Korea)",
                "Zomer Editie 22: Barcelona (Spanje)", "Zomer Editie 23: Atlanta (Verenigde Staten)", "Zomer Editie 24: Sydney (Australië)",
                "Zomer Editie 25: Athene (Griekenland)", "Zomer Editie 26: Peking (China)", "Zomer Editie 27: Londen (Verenigd Koninkrijk)",
                "Zomer Editie 28: Rio de Janeiro (Brazilië)", "Zomer Editie 29: Tokio (Japan)", "Zomer Editie 30: Parijs (Frankrijk)",
                "Zomer Editie 31: Los Angeles (Verenigde Staten)"
            ];
            
            const select = document.getElementById("editie-select");
            select.innerHTML = "";
            editions.forEach((edition, index) => {
                const option = document.createElement("option");
                option.value = index + 1;
                option.textContent = edition;
                select.appendChild(option);
            });
        }
    </script>
</body>
</html>
