<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedstrijdbeheer - Multisport Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <h1>Wedstrijdbeheer</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="manager.html">Manager Pagina</a></li>
                <li><a href="admin.html">Admin Panel</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Bewerk Wedstrijden per Editie</h2>
            <p>Selecteer een editie om het schema te beheren.</p>
            <label for="editie-select">Kies een Editie:</label>
            <select id="editie-select" onchange="loadSchedule()">
                <!-- Dynamisch geladen edities -->
            </select>
        </section>
        
        <section>
            <h2>Wedstrijdschema</h2>
            <table>
                <thead>
                    <tr>
                        <th>Dag</th>
                        <th>Tijd</th>
                        <th>Sport</th>
                        <th>Onderdeel</th>
                        <th>Locatie</th>
                        <th>Acties</th>
                    </tr>
                </thead>
                <tbody id="schedule-list">
                    <!-- Dynamisch geladen wedstrijden -->
                </tbody>
            </table>
        </section>

        <section>
            <h2>Speciale Ceremonies</h2>
            <button onclick="addCeremony('Opening')">➕ Voeg Openingsceremonie toe</button>
            <button onclick="addCeremony('Sluiting')">➕ Voeg Sluitingsceremonie toe</button>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            loadEditions();
        });

        function addCeremony(type) {
            const editionId = document.getElementById("editie-select").value;
            if (!editionId) {
                alert("Selecteer eerst een editie!");
                return;
            }
            let ceremonies = JSON.parse(localStorage.getItem("ceremonies")) || [];
            ceremonies.push({
                editionId: editionId,
                type: type,
                time: type === "Opening" ? "18:00" : "20:00",
                location: "Hoofd Stadion"
            });
            localStorage.setItem("ceremonies", JSON.stringify(ceremonies));
            alert(type + " toegevoegd!");
        }
    </script>
</body>
</html>
