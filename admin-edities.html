<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Editiebeheer - Multisport Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <h1>Editiebeheer</h1>
        <nav>
            <ul>
                <li><a href="admin.html">Terug naar Admin</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Editie Overzicht</h2>
            <button onclick="addEdition()">Nieuwe Editie Toevoegen</button>
            <table>
                <thead>
                    <tr>
                        <th>Naam</th>
                        <th>Startdatum</th>
                        <th>Locatie</th>
                        <th>Gastland</th>
                        <th>Acties</th>
                    </tr>
                </thead>
                <tbody id="edition-list">
                    <!-- Edities worden hier geladen -->
                </tbody>
            </table>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            loadEditions();
        });

        function loadEditions() {
            let editions = JSON.parse(localStorage.getItem("editions")) || [];
            let editionList = document.getElementById("edition-list");
            editionList.innerHTML = "";
            
            editions.forEach((edition, index) => {
                let row = document.createElement("tr");
                row.innerHTML = `
                    <td>${edition.name}</td>
                    <td>${edition.startDate}</td>
                    <td>${edition.location}</td>
                    <td>${edition.hostCountry}</td>
                    <td>
                        <button onclick="editEdition(${index})">Bewerken</button>
                        <button onclick="deleteEdition(${index})">Verwijderen</button>
                    </td>
                `;
                editionList.appendChild(row);
            });
        }

        function addEdition() {
            let name = prompt("Naam van de Editie (bijv. Zomer Editie 1):");
            let startDate = prompt("Startdatum (YYYY-MM-DD):");
            let location = prompt("Locatie (bijv. Athene, Griekenland):");
            let hostCountry = prompt("Gastland:");
            
            if (name && startDate && location && hostCountry) {
                let newEdition = { name, startDate, location, hostCountry };
                
                let editions = JSON.parse(localStorage.getItem("editions")) || [];
                editions.push(newEdition);
                localStorage.setItem("editions", JSON.stringify(editions));
                loadEditions();
            }
        }

        function deleteEdition(index) {
            if (confirm("Weet je zeker dat je deze editie wilt verwijderen?")) {
                let editions = JSON.parse(localStorage.getItem("editions")) || [];
                editions.splice(index, 1);
                localStorage.setItem("editions", JSON.stringify(editions));
                loadEditions();
            }
        }

        function editEdition(index) {
            let editions = JSON.parse(localStorage.getItem("editions")) || [];
            let edition = editions[index];
            
            let newStartDate = prompt("Nieuwe startdatum (YYYY-MM-DD):", edition.startDate);
            let newLocation = prompt("Nieuwe locatie:", edition.location);
            let newHostCountry = prompt("Nieuw gastland:", edition.hostCountry);
            
            if (newStartDate) edition.startDate = newStartDate;
            if (newLocation) edition.location = newLocation;
            if (newHostCountry) edition.hostCountry = newHostCountry;
            
            localStorage.setItem("editions", JSON.stringify(editions));
            loadEditions();
        }
    </script>
</body>
</html>
