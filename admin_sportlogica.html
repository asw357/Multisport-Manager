<script>
  const sporten = JSON.parse(localStorage.getItem("sportonderdelen")) || [];
  const sportSelect = document.getElementById("sportSelect");
  const onderdeelSelect = document.getElementById("onderdeelSelect");
  const instellingen = document.getElementById("instellingen");
  const uitleg = document.getElementById("uitleg");
  const type = document.getElementById("type");
  const logicaForm = document.getElementById("logicaForm");
  const logicaWeergave = document.getElementById("logicaWeergave");

  let sportlogica = JSON.parse(localStorage.getItem("sportlogica")) || {};

  // Vul sporten
  const uniekeSporten = [...new Set(sporten.map(s => s.sport))];
  uniekeSporten.forEach(sport => {
    const opt = document.createElement("option");
    opt.value = sport;
    opt.textContent = sport;
    sportSelect.appendChild(opt);
  });

  // Vul onderdelen per sport
  sportSelect.addEventListener("change", () => {
    const gekozen = sportSelect.value;
    onderdeelSelect.innerHTML = "";
    const gefilterd = sporten.filter(o => o.sport === gekozen);
    gefilterd.forEach(o => {
      const opt = document.createElement("option");
      opt.value = JSON.stringify(o); // sla object op
      opt.textContent = `${o.geslacht} - ${o.onderdeel}`;
      onderdeelSelect.appendChild(opt);
    });
  });

  onderdeelSelect.addEventListener("change", toonHuidigeLogica);

  function maakSleutel() {
    const sport = sportSelect.value;
    const onderdeel = JSON.parse(onderdeelSelect.value);
    return `${sport} - ${onderdeel.geslacht} - ${onderdeel.onderdeel}`;
  }

  function toonHuidigeLogica() {
    const sleutel = maakSleutel();
    const l = sportlogica[sleutel];
    if (!l) {
      logicaWeergave.innerHTML = "<p>Geen specifieke logica ingesteld voor dit onderdeel.</p>";
      return;
    }
    type.value = l.type || "standaard";
    instellingen.value = JSON.stringify(l.instellingen || {}, null, 2);
    uitleg.value = l.uitleg || "";
    logicaWeergave.innerHTML = `
      <p><strong>Type:</strong> ${l.type}</p>
      <p><strong>Instellingen:</strong> <pre>${JSON.stringify(l.instellingen, null, 2)}</pre></p>
      <p><strong>Uitleg:</strong> ${l.uitleg}</p>
    `;
  }

  logicaForm.addEventListener("submit", e => {
    e.preventDefault();
    const sleutel = maakSleutel();
    try {
      const parsed = instellingen.value ? JSON.parse(instellingen.value) : {};
      sportlogica[sleutel] = {
        type: type.value,
        instellingen: parsed,
        uitleg: uitleg.value.trim()
      };
      localStorage.setItem("sportlogica", JSON.stringify(sportlogica));
      alert("Logica opgeslagen!");
      toonHuidigeLogica();
    } catch (err) {
      alert("Instellingen zijn geen geldige JSON.");
    }
  });
</script>
