<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Adminpaneel – Multisport-Manager</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      background: #f0f2f5;
      height: 100vh;
    }

    .sidebar {
      width: 220px;
      background-color: #004080;
      color: white;
      padding: 20px;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
    }

    .sidebar h2 {
      font-size: 1.4em;
      margin-bottom: 20px;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
    }

    .sidebar li {
      margin-bottom: 10px;
    }

    .sidebar a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .sidebar a:hover {
      text-decoration: underline;
    }

    .main-content {
      flex-grow: 1;
      padding: 40px;
      overflow-y: auto;
    }

    h1 {
      margin-bottom: 20px;
    }

    .section {
      margin-bottom: 40px;
    }

    .section h2 {
      margin-bottom: 20px;
      color: #004080;
      border-bottom: 2px solid #ccc;
      padding-bottom: 5px;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .admin-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.2s ease;
    }

    .admin-card:hover {
      transform: translateY(-4px);
    }

    .admin-icon {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .admin-card a {
      text-decoration: none;
      color: #004080;
      font-weight: bold;
    }

    @media (max-width: 800px) {
      .sidebar { display: none; }
      .main-content { padding: 20px; }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <h2>🔧 Admin</h2>
    <ul>
      <li><a href="#editie">🗂️ Editiebeheer</a></li>
      <li><a href="admin_onderdeelbeheer.html">🎯 Onderdeelbeheer</a></li>
      <li><a href="#sport">🏅 Sport & Atleten</a></li>
      <li><a href="#systeem">⚙️ Systeem</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <h1>Adminpaneel</h1>

    <section id="editie" class="section">
      <h2>🗂️ Editiebeheer</h2>
      <div class="admin-grid">
        <div class="admin-card"><div class="admin-icon">🗂️</div><a href="admin_editiebeheer.html">Editie Beheer</a></div>
        <div class="admin-card"><div class="admin-icon">📏</div><a href="admin_limieten.html">Limieten</a></div>
        <div class="admin-card"><div class="admin-icon">🌤️</div><a href="admin_weer.html">Weer</a></div>
      </div>
    </section>

    <section id="sport" class="section">
      <h2>🏅 Sport & Atleten</h2>
      <div class="admin-grid">
        <div class="admin-card"><div class="admin-icon">🏅</div><a href="admin_sporten.html">Sporten</a></div>
        <div class="admin-card"><div class="admin-icon">👤</div><a href="admin_atleetbeheer.html">Atleten</a></div>
        <div class="admin-card"><div class="admin-icon">🔗</div><a href="admin_combinaties.html">Combinaties</a></div>
        <div class="admin-card"><div class="admin-icon">🧠</div><a href="admin_tactieken.html">Tactieken</a></div>
      </div>
    </section>

    <section id="systeem" class="section">
      <h2>⚙️ Systeem</h2>
      <div class="admin-grid">
        <div class="admin-card"><div class="admin-icon">🌍</div><a href="admin_landen.html">Landen</a></div>
      </div>
    </section>
  </main>
</body>
</html>
