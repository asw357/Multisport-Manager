<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Multisport Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <h1>Admin Panel</h1>
        <nav>
            <ul>
                <li><a href="manager.html">Terug naar Manager</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="admin-section">
            <h2>Beheer Landenlijst</h2>
            <label for="new-country">Nieuw Land:</label>
            <input type="text" id="new-country" placeholder="Voer een land in">
            <button onclick="addCountry()">Toevoegen</button>
            <ul id="country-list"></ul>
        </section>

        <section class="admin-section">
            <h2>Beheer Gebruikers</h2>
            <ul id="user-list"></ul>
        </section>

        <section class="admin-section">
            <h2>Pas Medal Points Regels Aan</h2>
            <label for="mp-value">Nieuwe MP Waarde:</label>
            <input type="number" id="mp-value" placeholder="Voer MP waarde in">
            <button onclick="updateMP()">Opslaan</button>
        </section>

        <section class="admin-section">
            <h2>Beheer Inactieve Spelers</h2>
            <button onclick="removeInactiveUsers()">Verwijder inactieve spelers</button>
        </section>

        <section class="admin-section">
            <h2>Instellen Atletenbeheer Limieten</h2>
            <label for="sport-name">Sport:</label>
            <input type="text" id="sport-name" placeholder="Voer een sport in">
            <label for="event-name">Onderdeel:</label>
            <input type="text" id="event-name" placeholder="Voer een onderdeel in">
            <label for="gender">Geslacht:</label>
            <select id="gender">
                <option value="M">Mannen</option>
                <option value="V">Vrouwen</option>
            </select>
            <label for="limit">Max. aantal atleten:</label>
            <input type="number" id="limit" placeholder="Aantal atleten">
            <button onclick="setAthleteLimit()">Opslaan</button>
            <ul id="athlete-limits"></ul>
        </section>

        <section class="admin-section">
            <h2>Beheer Starterslijst</h2>
            <label for="starter-name">Naam Atleet:</label>
            <input type="text" id="starter-name" placeholder="Naam atleet">
            <label for="starter-sport">Sport:</label>
            <input type="text" id="starter-sport" placeholder="Sport">
            <label for="starter-country">Land:</label>
            <input type="text" id="starter-country" placeholder="Land">
            <button onclick="addStarterAthlete()">Toevoegen</button>
            <ul id="starter-list"></ul>
        </section>
    </main>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let user = JSON.parse(localStorage.getItem("loggedInUser"));
            if (!user || user.email !== "wilcoboesveld12@hotmail.com") {
                window.location.href = "index.html";
                return;
            }
            
            loadCountries();
            loadUsers();
            loadAthleteLimits();
            loadStarterList();
        });
        
        function setAthleteLimit() {
            let sport = document.getElementById("sport-name").value;
            let event = document.getElementById("event-name").value;
            let gender = document.getElementById("gender").value;
            let limit = document.getElementById("limit").value;
            
            if (sport && event && limit) {
                let limits = JSON.parse(localStorage.getItem("athleteLimits")) || [];
                limits.push({ sport, event, gender, limit });
                localStorage.setItem("athleteLimits", JSON.stringify(limits));
                loadAthleteLimits();
            }
        }

        function loadAthleteLimits() {
            let limits = JSON.parse(localStorage.getItem("athleteLimits")) || [];
            let limitList = document.getElementById("athlete-limits");
            limitList.innerHTML = "";
            limits.forEach(l => {
                let li = document.createElement("li");
                li.innerText = `${l.sport} - ${l.event} (${l.gender}): Max ${l.limit}`;
                limitList.appendChild(li);
            });
        }

        function addStarterAthlete() {
            let name = document.getElementById("starter-name").value;
            let sport = document.getElementById("starter-sport").value;
            let country = document.getElementById("starter-country").value;
            
            if (name && sport && country) {
                let starters = JSON.parse(localStorage.getItem("starterAthletes")) || [];
                starters.push({ name, sport, country });
                localStorage.setItem("starterAthletes", JSON.stringify(starters));
                loadStarterList();
            }
        }

        function loadStarterList() {
            let starters = JSON.parse(localStorage.getItem("starterAthletes")) || [];
            let starterList = document.getElementById("starter-list");
            starterList.innerHTML = "";
            starters.forEach(s => {
                let li = document.createElement("li");
                li.innerText = `${s.name} - ${s.sport} (${s.country})`;
                starterList.appendChild(li);
            });
        }
    </script>
</body>
</html>
