<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Reset Tool</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .container { max-width: 600px; margin: auto; padding: 20px; background: #fff3f3; border: 2px solid #f00; border-radius: 8px; }
    button { margin: 10px 0; padding: 10px; background: #ff4d4d; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #e60000; }
  </style>
</head>
<body>
  <header>
    <h1>🧪 Admin Reset Tool</h1>
    <nav><a href="admin.html">⬅️ Terug naar Admin</a></nav>
  </header>

  <main>
    <div class="container">
      <p><strong>LET OP:</strong> Deze acties kunnen niet ongedaan worden gemaakt!</p>

      <button onclick="resetData()">❌ Reset alle testdata (atleten, wedstrijden, schema's, records, spiegel)</button>
      <button onclick="resetGebruikers()">❌ Reset alle gebruikers (behalve admin)</button>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie – Admin Tools</p>
  </footer>

  <script>
    function resetData() {
      const bevestigen = confirm("Weet je zeker dat je ALLE data wilt wissen behalve gebruikers?");
      if (!bevestigen) return;

      localStorage.removeItem("atleten");
      localStorage.removeItem("wedstrijdschema");
      localStorage.removeItem("records");
      localStorage.removeItem("nationale_records");
      localStorage.removeItem("medaillespiegel");
      localStorage.removeItem("nieuwsfeed");
      localStorage.removeItem("edities");
      localStorage.removeItem("mp_instellingen");
      localStorage.removeItem("limieten");
      alert("Alle gegevens succesvol gewist ✅");
    }

    function resetGebruikers() {
      const bevestigen = confirm("Weet je zeker dat je ALLE gebruikers behalve de admin wilt wissen?");
      if (!bevestigen) return;

      const alleUsers = JSON.parse(localStorage.getItem("users")) || [];
      const gefilterd = alleUsers.filter(u => u.email === "wilcoboesveld12@hotmail.com");
      localStorage.setItem("users", JSON.stringify(gefilterd));
      alert("Gebruikers succesvol gereset ✅");
    }
  </script>
</body>
</html>
