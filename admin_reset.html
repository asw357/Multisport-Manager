<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧪 Admin – Reset Testomgeving</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body { font-family: sans-serif; padding: 30px; text-align: center; }
    button {
      padding: 12px 20px;
      font-size: 16px;
      background-color: #c62828;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #b71c1c;
    }
  </style>
</head>
<body>
  <h1>🧪 Admin – Reset Testomgeving</h1>
  <p>Deze actie verwijdert ALLE gegevens en herstelt de testomgeving naar de beginstatus.</p>
  <button onclick="resetDatabase()">🔄 Reset Testomgeving</button>
  <script>
    async function resetDatabase() {
      const tabellen = [
        "users", "atleten", "edities", "limieten", "sportlogica", "schema", "rondes",
        "statcategorieen", "mp_settings", "nieuws", "records", "combinaties"
      ];

      for (const tabel of tabellen) {
        await supabase.from(tabel).delete().neq("id", 0);
      }

      alert("Testomgeving is volledig gereset!");
      window.location.href = "admin.html";
    }
  </script>
</body>
</html>
