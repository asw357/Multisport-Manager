<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medaillespiegel</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>🥇 All-Time Medaillespiegel</h1>
    <nav>
      <ul>
        <li><a href="edities.html">⬅️ Terug naar Edities</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <table>
      <thead>
        <tr>
          <th>🇺🇳 Land</th>
          <th>🥇 Goud</th>
          <th>🥈 Zilver</th>
          <th>🥉 Brons</th>
          <th>🏅 Totaal</th>
        </tr>
      </thead>
      <tbody id="medalTableBody">
        <!-- Medailles worden hier geladen -->
      </tbody>
    </table>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie – Medaillespiegel</p>
  </footer>

  <script>
    const medailles = JSON.parse(localStorage.getItem("medaillespiegel")) || {};

    function maakTabel() {
      const lijst = [];

      for (const land in medailles) {
        const entry = medailles[land];
        lijst.push({
          land,
          goud: entry.goud || 0,
          zilver: entry.zilver || 0,
          brons: entry.brons || 0,
          totaal: (entry.goud || 0) + (entry.zilver || 0) + (entry.brons || 0)
        });
      }

      lijst.sort((a, b) => 
        b.goud - a.goud || b.zilver - a.zilver || b.brons - a.brons
      );

      const tbody = document.getElementById("medalTableBody");
      tbody.innerHTML = "";

      lijst.forEach(item => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${item.land}</td>
          <td>${item.goud}</td>
          <td>${item.zilver}</td>
          <td>${item.brons}</td>
          <td>${item.totaal}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.addEventListener("DOMContentLoaded", maakTabel);
  </script>
</body>
</html>
