<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Limieten & Startatleten</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>📏 Limieten & Startatleten per Onderdeel</h1>
    <nav>
      <ul>
        <li><a href="admin.html">⬅️ Terug naar Admin Dashboard</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <form id="limietForm">
        <label for="sportSelect">Sportonderdeel:</label><br />
        <select id="sportSelect" required></select><br /><br />

        <label>🔢 Maximaal aantal atleten:</label><br />
        <input type="number" id="maxAtleten" min="0" required><br />

        <label>🎯 Aantal startatleten bij registratie:</label><br />
        <input type="number" id="startAtleten" min="0" required><br /><br />

        <button type="submit">Opslaan</button>
      </form>
    </section>

    <section style="margin-top: 30px;">
      <h2>📋 Huidige Instellingen</h2>
      <ul id="limietLijst"></ul>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie – Admin</p>
  </footer>

  <script>
    const sporten = JSON.parse(localStorage.getItem("sportonderdelen")) || [];
    const limieten = JSON.parse(localStorage.getItem("limieten")) || {};

    const select = document.getElementById("sportSelect");
    const lijst = document.getElementById("limietLijst");

    function vulDropdown() {
      sporten.forEach(s => {
        const key = `${s.sport} - ${s.geslacht} - ${s.onderdeel}`;
        const opt = document.createElement("option");
        opt.value = key;
        opt.textContent = key;
        select.appendChild(opt);
      });
    }

    function toonLijst() {
      lijst.innerHTML = "";
      for (const onderdeel in limieten) {
        const entry = limieten[onderdeel];
        const li = document.createElement("li");
        li.innerHTML = `
          <strong>${onderdeel}</strong>: Max ${entry.max} atleten – Start ${entry.start}
          <button onclick="verwijder('${onderdeel}')">🗑️</button>
        `;
        lijst.appendChild(li);
      }
    }

    document.getElementById("limietForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const onderdeel = select.value;
      const max = parseInt(document.getElementById("maxAtleten").value);
      const start = parseInt(document.getElementById("startAtleten").value);

      limieten[onderdeel] = { max, start };
      localStorage.setItem("limieten", JSON.stringify(limieten));
      toonLijst();
      e.target.reset();
    });

    function verwijder(onderdeel) {
      if (confirm(`Verwijder limiet voor ${onderdeel}?`)) {
        delete limieten[onderdeel];
        localStorage.setItem("limieten", JSON.stringify(limieten));
        toonLijst();
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      vulDropdown();
      toonLijst();
    });
  </script>
</body>
</html>
