<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚙️ Admin – Limieten & Startatleten</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    form, table {
      max-width: 900px;
      margin: 0 auto 40px auto;
    }
    input, select {
      width: 100%;
      padding: 6px;
      margin: 4px 0;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }
    th {
      background-color: #eee;
    }
    button {
      padding: 6px 12px;
    }
  </style>
</head>
<body>
  <header>
    <h1>⚙️ Admin – Limieten & Startatleten</h1>
    <nav><a href="admin.html">⬅️ Terug naar Admin</a></nav>
  </header>

  <main>
    <form id="limietForm">
      <label for="sport">Sport</label>
      <input type="text" id="sport" required />
      <label for="discipline">Discipline (optioneel)</label>
      <input type="text" id="discipline" />
      <label for="geslacht">Geslacht</label>
      <select id="geslacht">
        <option value="Mannen">Mannen</option>
        <option value="Vrouwen">Vrouwen</option>
        <option value="Gemengd">Gemengd</option>
      </select>
      <label for="onderdeel">Onderdeel</label>
      <input type="text" id="onderdeel" required />
      <label for="limiet">Max. Aantal Atleten</label>
      <input type="number" id="limiet" required />
      <label for="start">Aantal Startatleten</label>
      <input type="number" id="start" required />
      <button type="submit">➕ Toevoegen / Bijwerken</button>
    </form>

    <h2>Huidige Limieten</h2>
    <table>
      <thead>
        <tr>
          <th>Sport</th>
          <th>Discipline</th>
          <th>Geslacht</th>
          <th>Onderdeel</th>
          <th>Limiet</th>
          <th>Start</th>
          <th>Actie</th>
        </tr>
      </thead>
      <tbody id="limietTabel"></tbody>
    </table>
  </main>

  <script>
    async function laadLimieten() {
      const { data } = await supabase.from("limieten").select("*");
      const tbody = document.getElementById("limietTabel");
      tbody.innerHTML = "";

      data.forEach(l => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${l.sport}</td>
          <td>${l.discipline || ""}</td>
          <td>${l.geslacht}</td>
          <td>${l.onderdeel}</td>
          <td>${l.limiet}</td>
          <td>${l.start}</td>
          <td><button onclick="verwijderLimiet('${l.id}')">🗑️</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function verwijderLimiet(id) {
      await supabase.from("limieten").delete().eq("id", id);
      laadLimieten();
    }

    document.getElementById("limietForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const item = {
        sport: document.getElementById("sport").value,
        discipline: document.getElementById("discipline").value,
        geslacht: document.getElementById("geslacht").value,
        onderdeel: document.getElementById("onderdeel").value,
        limiet: parseInt(document.getElementById("limiet").value),
        start: parseInt(document.getElementById("start").value)
      };
      await supabase.from("limieten").upsert([item], {
        onConflict: ['sport', 'discipline', 'geslacht', 'onderdeel']
      });
      this.reset();
      laadLimieten();
    });

    laadLimieten();
  </script>
</body>
</html>
