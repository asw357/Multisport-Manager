<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Multisport Manager</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    header, main section, form, details { margin-bottom: 1rem; }
    input, select, button, textarea { padding: .5rem; font-size: 1rem; }
    .muted { color: #666; }
    .error { color: #b00020; }
    .ok { color: #0a7a25; }
    .small { font-size:.9rem; color:#666; }
  </style>
</head>
<body>
  <header>
    <h1>Multisport Manager</h1>
    <nav>
      <a id="adminLink" href="./admin.html" style="display:none;">Admin</a>
      <button id="logoutBtn" style="display:none;">Uitloggen</button>
      <button id="forceLogoutBtn" style="display:none;" title="Wis alle sessies & tokens">Forceer uitloggen</button>
    </nav>
  </header>

  <main>
    <section id="authSection">
      <h2>Inloggen / Registreren</h2>
      <form id="authForm">
        <label>E-mail <input type="email" id="email" required /></label>
        <label>Wachtwoord <input type="password" id="password" required /></label>
        <div style="display:flex; gap:.5rem; flex-wrap: wrap; margin-top:.5rem;">
          <button type="submit">Inloggen</button>
          <button type="button" id="registerBtn">Registreren</button>
          <button type="button" id="magicBtn" title="Stuur een magic link naar je mail">Stuur magic link</button>
        </div>
      </form>
      <p id="authMsg" class="muted"></p>
    </section>

    <section id="appSection" style="display:none;">
      <h2>Dashboard</h2>
      <p id="welcome"></p>
      <p class="small" id="switchHint" style="display:none;">
        Niet jij? Klik <a href="#" id="switchAccount">hier</a> om van account te wisselen.
      </p>

      <div id="countryCard">
        <h3>Land</h3>
        <p id="countryInfo">Nog geen land gekoppeld.</p>
        <button id="claimCountryBtn">Claim mijn land</button>
      </div>

      <div>
        <h3>Actieve edities (voorbeeld)</h3>
        <ul id="editionsList"></ul>
      </div>
    </section>

    <!-- DIAGNOSE: deze knop moet ALTIJD een alert geven als JS laadt -->
    <section>
      <h3>Diagnose</h3>
      <button id="diagBtn">Test: klik zou alert moeten tonen</button>
      <p id="diagMsg" class="muted"></p>
    </section>
  </main>

  <!-- Belangrijk: expliciet via src laden (sommige browsers cachen inline imports harder) -->
  <script type="module" src="./js/app.js"></script>
</body>
</html>
