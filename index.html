<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏅 Sport Manager Simulatie</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    nav a {
      display: inline-block;
      margin: 5px;
      padding: 8px 12px;
      background: #0077cc;
      color: white;
      text-decoration: none;
      border-radius: 4px;
    }
    .headlines {
      margin-top: 30px;
      background: #f0f0f0;
      padding: 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🏅 Welkom bij Sport Manager Simulatie</h1>
    <nav>
      <a href="register.html">📝 Registreren</a>
      <a href="login.html">🔐 Inloggen</a>
      <a href="regels.html">📖 Regels & Uitleg</a>
    </nav>
  </header>

  <main>
    <section class="headlines">
      <h2>📰 Laatste Nieuws</h2>
      <ul id="nieuwsHeadlines">🔄 Laden...</ul>
    </section>
  </main>
  <script>
    async function laadHeadlines() {
      const { data: nieuws } = await supabase
        .from("nieuws")
        .select("titel, datum")
        .order("datum", { ascending: false })
        .limit(5);

      const ul = document.getElementById("nieuwsHeadlines");
      ul.innerHTML = "";

      if (!nieuws || nieuws.length === 0) {
        ul.innerHTML = "<li>📭 Geen nieuws beschikbaar.</li>";
        return;
      }

      nieuws.forEach(n => {
        const li = document.createElement("li");
        li.textContent = `${n.titel} (${new Date(n.datum).toLocaleDateString()})`;
        ul.appendChild(li);
      });
    }

    laadHeadlines();
  </script>
</body>
</html>
