<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Wedstrijd Simulatie</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    #commentaarBox {
      background: #f4f4f4;
      border: 1px solid #ccc;
      padding: 10px;
      height: 200px;
      overflow-y: auto;
      margin-top: 10px;
    }
    .highlight { font-weight: bold; color: darkgreen; }
    .dq { color: red; }
    .emoji-reacties button { margin-right: 5px; }
  </style>
</head>
<body>
  <header>
    <h1>📺 Live Wedstrijd Simulatie</h1>
    <nav><a href="edities.html">⬅️ Terug naar Edities</a></nav>
  </header>

  <main>
    <section>
      <h2 id="wedstrijdTitel">Wielersport - Baan - Mannen - 10 km</h2>
      <button onclick="startSimulatie()">▶️ Start simulatie</button>
      <div id="commentaarBox"></div>

      <div class="emoji-reacties">
        <p>Reacties:</p>
        <button onclick="reageerEmoji('🔥')">🔥</button>
        <button onclick="reageerEmoji('😱')">😱</button>
        <button onclick="reageerEmoji('🥇')">🥇</button>
        <button onclick="reageerEmoji('💀')">💀</button>
        <div id="emojiReacties"></div>
      </div>

      <h3>Uitslag</h3>
      <ol id="uitslag"></ol>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie</p>
  </footer>

  <script>
    const deelnemers = [
      { naam: "NED-VAL", land: "Nederland", snelheid: 8, kracht: 7, techniek: 6, leeftijd: 24, tactiek: "Snelle start" },
      { naam: "FRA-ZEN", land: "Frankrijk", snelheid: 7, kracht: 8, techniek: 7, leeftijd: 30, tactiek: "Evenwichtig" },
      { naam: "GER-TIM", land: "Duitsland", snelheid: 9, kracht: 6, techniek: 6, leeftijd: 27, tactiek: "Snelle start" },
      { naam: "USA-JAX", land: "VS", snelheid: 6, kracht: 8, techniek: 8, leeftijd: 21, tactiek: "Finish focus" }
    ];

    const commentaarBox = document.getElementById("commentaarBox");
    const uitslagBox = document.getElementById("uitslag");
    const emojiBox = document.getElementById("emojiReacties");

    function reageerEmoji(emoji) {
      emojiBox.innerHTML += emoji + " ";
    }

    function startSimulatie() {
      commentaarBox.innerHTML = "<p>🏁 De wedstrijd is gestart...</p>";
      uitslagBox.innerHTML = "";
      emojiBox.innerHTML = "";

      let scores = deelnemers.map(deelnemer => {
        let base = deelnemer.snelheid * 1.5 + deelnemer.kracht + deelnemer.techniek;
        base -= Math.max(0, deelnemer.leeftijd - 28) * 1.5;

        let bonus = 0;
        let disqualified = false;

        if (deelnemer.tactiek === "Snelle start") {
          bonus += 4;
          if (Math.random() < 0.12) {
            disqualified = true;
          }
        } else if (deelnemer.tactiek === "Finish focus") {
          bonus += 2;
        } else {
          bonus += 1;
        }

        let random = Math.floor(Math.random() * 5);
        let totaal = base + bonus + random;

        return { ...deelnemer, score: disqualified ? -999 : totaal, dq: disqualified };
      });

      // Live commentaar
      let stappen = [
        "🏃‍♂️ De atleten zijn onderweg...",
        "📣 Eerste bocht! Iedereen ligt dicht bij elkaar...",
        `${deelnemers[0].naam} neemt de leiding!`,
        `${deelnemers[1].naam} versnelt...`,
        `${deelnemers[2].naam} zakt wat terug...",
        "🔔 Laatste ronde komt eraan!",
        `${deelnemers[3].naam} komt met een eindsprint!",
        "🏁 De finishlijn is in zicht!",
        "⏱️ Uitslag wordt bepaald..."
      ];

      let i = 0;
      const interval = setInterval(() => {
        if (i < stappen.length) {
          commentaarBox.innerHTML += `<p>${stappen[i]}</p>`;
          commentaarBox.scrollTop = commentaarBox.scrollHeight;
          i++;
        } else {
          clearInterval(interval);
          toonUitslag(scores);
        }
      }, 2000); // 2 seconden per commentaarstap
    }

    function toonUitslag(scores) {
      const gesorteerd = scores.sort((a, b) => b.score - a.score);
      gesorteerd.forEach(d => {
        const li = document.createElement("li");
        li.innerHTML = `${d.naam} (${d.land}) ${d.dq ? '<span class='dq'>DQ</span>' : ''}`;
        uitslagBox.appendChild(li);
      });
    }
  </script>
</body>
</html>
