<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Wedstrijden</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>📺 Live Wedstrijden</h1>
    <nav>
      <ul>
        <li><a href="edities.html">⬅️ Terug naar Edities</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="wedstrijdenVandaag">
      <h2>Wedstrijden vandaag (bijv. Dag 1)</h2>
      <ul id="wedstrijdLijst">
        <!-- Dynamisch gevuld -->
      </ul>
    </section>

    <section id="liveSimulatie" style="margin-top: 20px;">
      <!-- Simulatie result -->
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie – Live Wedstrijd</p>
  </footer>

  <script>
    // DEMO: Vaste data tot schema's echt actief worden
    const wedstrijden = [
      {
        editie: "Zomereditie 7",
        onderdeel: "Atletiek - Mannen - 100m",
        dag: "Dag 1",
        tijd: "10:00",
        deelnemers: ["Nederland", "Frankrijk", "Duitsland", "VS"]
      },
      {
        editie: "Zomereditie 7",
        onderdeel: "Zwemmen - Vrouwen - 50m",
        dag: "Dag 1",
        tijd: "12:00",
        deelnemers: ["Nederland", "Italië", "Canada"]
      }
    ];

    const lijst = document.getElementById("wedstrijdLijst");
    const liveDiv = document.getElementById("liveSimulatie");

    function toonWedstrijden() {
      wedstrijden.forEach((w, index) => {
        const li = document.createElement("li");
        li.innerHTML = `
          <strong>${w.onderdeel}</strong> – ${w.editie}<br/>
          Tijd: ${w.tijd} | Deelnemers: ${w.deelnemers.join(", ")}<br/>
          <button onclick="startSimulatie(${index})">▶️ Start simulatie</button>
        `;
        lijst.appendChild(li);
      });
    }

    function startSimulatie(index) {
      const wedstrijd = wedstrijden[index];
      liveDiv.innerHTML = `<h3>Simulatie: ${wedstrijd.onderdeel}</h3><p>Even geduld...</p>`;

      setTimeout(() => {
        // Simuleer prestatie (dummy logica)
        const uitslag = [...wedstrijd.deelnemers].sort(() => Math.random() - 0.5);

        const html = uitslag.map((land, i) => {
          const label = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `#${i+1}`;
          return `<li>${label} – ${land}</li>`;
        }).join("");

        liveDiv.innerHTML = `
          <p><strong>Uitslag:</strong></p>
          <ul>${html}</ul>
        `;

        // Later: opslaan in resultaten + check op MR/NR + MP-verdeling
      }, 2000);
    }

    document.addEventListener("DOMContentLoaded", toonWedstrijden);
  </script>
</body>
</html>
