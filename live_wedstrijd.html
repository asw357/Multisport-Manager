<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Wedstrijd Simulatie</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    #commentaarBox {
      background: #f4f4f4;
      border: 1px solid #ccc;
      padding: 10px;
      height: 150px;
      overflow-y: auto;
      margin-top: 10px;
    }
    .highlight { font-weight: bold; color: darkgreen; }
    .dq { color: red; }
  </style>
</head>
<body>
  <header>
    <h1>📺 Live Wedstrijd Simulatie</h1>
    <nav><a href="edities.html">⬅️ Terug naar Edities</a></nav>
  </header>

  <main>
    <section>
      <h2>Atletiek - Mannen - 100m</h2>
      <button onclick="startSimulatie()">▶️ Start simulatie</button>
      <div id="commentaarBox"></div>
      <h3>Uitslag</h3>
      <ol id="uitslag"></ol>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie</p>
  </footer>

  <script>
    const deelnemers = [
      { naam: "NED-VAL", land: "Nederland", snelheid: 8, leeftijd: 24, tactiek: "Snelle start" },
      { naam: "FRA-ZEN", land: "Frankrijk", snelheid: 7, leeftijd: 30, tactiek: "Evenwichtig" },
      { naam: "GER-TIM", land: "Duitsland", snelheid: 9, leeftijd: 27, tactiek: "Snelle start" },
      { naam: "USA-JAX", land: "VS", snelheid: 6, leeftijd: 21, tactiek: "Finish focus" }
    ];

    const commentaarBox = document.getElementById("commentaarBox");
    const uitslagBox = document.getElementById("uitslag");

    function startSimulatie() {
      commentaarBox.innerHTML = "<p>🏁 De wedstrijd is begonnen...</p>";
      uitslagBox.innerHTML = "";

      let scores = deelnemers.map(deelnemer => {
        let score = deelnemer.snelheid * 10;

        // Leeftijdsafbouw (ouder = trager)
        score -= Math.max(0, deelnemer.leeftijd - 28) * 2;

        // Tactiek effecten
        if (deelnemer.tactiek === "Snelle start") {
          score += 5;
          if (Math.random() < 0.1) {
            commentaarBox.innerHTML += `<p class='dq'>🚨 ${deelnemer.naam} maakt een valse start en is gediskwalificeerd!</p>`;
            score = -1000;
          } else {
            commentaarBox.innerHTML += `<p>${deelnemer.naam} schiet uit de startblokken! ⚡</p>`;
          }
        } else if (deelnemer.tactiek === "Finish focus") {
          score += 3;
          commentaarBox.innerHTML += `<p>${deelnemer.naam} spaart energie voor een eindsprint. 🏃‍♂️💨</p>`;
        } else {
          commentaarBox.innerHTML += `<p>${deelnemer.naam} kiest voor een evenwichtige race.</p>`;
        }

        // Random verrassingsfactor
        score += Math.floor(Math.random() * 10);

        return { ...deelnemer, score };
      });

      // Sorteer op hoogste score = beste prestatie
      scores.sort((a, b) => b.score - a.score);

      // Toon uitslag
      scores.forEach((d, i) => {
        const li = document.createElement("li");
        li.innerHTML = `${d.naam} (${d.land}) ${d.score < 0 ? '<span class="dq">DQ</span>' : ''}`;
        uitslagBox.appendChild(li);
      });
    }
  </script>
</body>
</html>
