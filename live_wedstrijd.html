<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Wedstrijd Simulatie</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    #commentaarBox {
      background: #f4f4f4;
      border: 1px solid #ccc;
      padding: 10px;
      height: 300px;
      overflow-y: auto;
      margin-top: 10px;
    }
    .highlight { font-weight: bold; color: darkgreen; }
    .dq { color: red; }
    .finish { font-weight: bold; color: navy; }
  </style>
</head>
<body>
  <header>
    <h1>📺 Live Wedstrijd Simulatie</h1>
    <nav><a href="edities.html">⬅️ Terug naar Edities</a></nav>
  </header>

  <main>
    <section>
      <h2 id="wedstrijdTitel">Live Wedstrijd</h2>
      <button onclick="startSimulatie()">▶️ Start simulatie</button>
      <div id="commentaarBox"></div>
      <h3>Uitslag</h3>
      <ol id="uitslag"></ol>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie</p>
  </footer>

  <script>
    const onderdelenTest = [
      "Atletiek - Mannen - 100m",
      "Atletiek - Mannen - 400m",
      "Atletiek - Mannen - Hink-stap-springen",
      "Gewichtheffen - Mannen - Eenarmig (Open)",
      "Turnen - Mannen - Touwklimmen",
      "Turnen - Mannen - Knotszwaaien",
      "Schietsport - Mannen - Militair pistool 25 m",
      "Wielersport - Baan - Mannen - 10 km",
      "Zeilen - Mannen - 0,5 ton",
      "Zwemmen - Mannen - 100 m vrije slag matrozen"
    ];

    const deelnemers = [
      { naam: "NED-VAL", land: "Nederland", snelheid: 8, kracht: 6, techniek: 5, uithouding: 7, leeftijd: 24, tactiek: "Snelle start" },
      { naam: "FRA-ZEN", land: "Frankrijk", snelheid: 7, kracht: 7, techniek: 6, uithouding: 8, leeftijd: 30, tactiek: "Evenwichtig" },
      { naam: "GER-TIM", land: "Duitsland", snelheid: 9, kracht: 8, techniek: 4, uithouding: 6, leeftijd: 27, tactiek: "Snelle start" },
      { naam: "USA-JAX", land: "VS", snelheid: 6, kracht: 7, techniek: 8, uithouding: 9, leeftijd: 21, tactiek: "Finish focus" }
    ];

    const wedstrijdTitel = document.getElementById("wedstrijdTitel");
    const commentaarBox = document.getElementById("commentaarBox");
    const uitslagBox = document.getElementById("uitslag");

    function startSimulatie() {
      const onderdeel = onderdelenTest[Math.floor(Math.random() * onderdelenTest.length)];
      wedstrijdTitel.textContent = onderdeel;
      commentaarBox.innerHTML = "<p>🏁 De wedstrijd is begonnen...</p>";
      uitslagBox.innerHTML = "";

      let scores = deelnemers.map(deelnemer => {
        let score = 0;

        // Simuleer op basis van onderdeeltype (hier voorlopig snelheid + techniek + kracht + random)
        score += deelnemer.snelheid * 1.5 + deelnemer.kracht + deelnemer.techniek;

        // Leeftijdsafbouw
        score -= Math.max(0, deelnemer.leeftijd - 28) * 1.5;

        // Tactiek effecten
        let dq = false;
        if (deelnemer.tactiek === "Snelle start") {
          score += 5;
          if (Math.random() < 0.15) {
            dq = true;
            score = -999;
          }
        } else if (deelnemer.tactiek === "Finish focus") {
          score += 3;
        }

        // Verrassing
        score += Math.floor(Math.random() * 8);

        return { ...deelnemer, score, dq };
      });

      // Simuleer live verloop
      let stappen = 5;
      let stap = 0;

      const interval = setInterval(() => {
        if (stap >= stappen) {
          clearInterval(interval);
          toonUitslag(scores);
          return;
        }

        const liveMoment = scores
          .map(d => `${d.naam}: ${Math.floor(Math.random() * 100)}%`) // pseudoprogressie
          .join("<br>");

        commentaarBox.innerHTML += `<p><strong>Tussenstand ${stap + 1}:</strong><br>${liveMoment}</p>`;
        commentaarBox.scrollTop = commentaarBox.scrollHeight;
        stap++;
      }, 1000);
    }

    function toonUitslag(scores) {
      commentaarBox.innerHTML += `<p class='finish'>🏁 De race is voorbij! Hier is de uitslag:</p>`;
      scores.sort((a, b) => b.score - a.score);

      scores.forEach(d => {
        const li = document.createElement("li");
        li.innerHTML = `${d.naam} (${d.land}) ${d.dq ? '<span class='dq'>DQ</span>' : ''}`;
        uitslagBox.appendChild(li);
      });
    }
  </script>
</body>
</html>
