<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Wedstrijd Simulatie</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    #commentaarBox {
      background: #f4f4f4;
      border: 1px solid #ccc;
      padding: 10px;
      height: 250px;
      overflow-y: auto;
      margin-top: 10px;
      font-family: monospace;
    }
    .highlight { font-weight: bold; color: darkgreen; }
    .dq { color: red; font-weight: bold; }
    .blessure { color: orange; }
    .emoji { margin-left: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <header>
    <h1>📺 Live Wedstrijd Simulatie</h1>
    <nav><a href="edities.html">⬅️ Terug naar Edities</a></nav>
  </header>

  <main>
    <section>
      <h2 id="wedstrijdTitel">[Sportonderdeel]</h2>
      <button onclick="startSimulatie()">▶️ Start simulatie</button>
      <div id="commentaarBox"></div>
      <div id="emojiReacties">
        <span class="emoji" onclick="reageer('🔥')">🔥</span>
        <span class="emoji" onclick="reageer('😱')">😱</span>
        <span class="emoji" onclick="reageer('🥇')">🥇</span>
        <span class="emoji" onclick="reageer('💀')">💀</span>
      </div>
      <h3>Uitslag</h3>
      <ol id="uitslag"></ol>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie</p>
  </footer>

  <script>
    const deelnemers = [
      { naam: "NED-VAL", land: "Nederland", stats: { snelheid: 8 }, leeftijd: 24, tactiek: "Snelle start" },
      { naam: "FRA-ZEN", land: "Frankrijk", stats: { snelheid: 7 }, leeftijd: 30, tactiek: "Evenwichtig" },
      { naam: "GER-TIM", land: "Duitsland", stats: { snelheid: 9 }, leeftijd: 27, tactiek: "Snelle start" },
      { naam: "USA-JAX", land: "VS", stats: { snelheid: 6 }, leeftijd: 21, tactiek: "Finish focus" }
    ];

    const commentaarBox = document.getElementById("commentaarBox");
    const uitslagBox = document.getElementById("uitslag");
    let wedstrijdDuur = 10; // seconden

    function reageer(emoji) {
      const reactie = document.createElement("p");
      reactie.textContent = `Speler reageert met ${emoji}`;
      reactie.style.fontStyle = "italic";
      commentaarBox.appendChild(reactie);
    }

    function startSimulatie() {
      commentaarBox.innerHTML = "<p>🏁 De wedstrijd is gestart...</p>";
      uitslagBox.innerHTML = "";

      const prestatie = deelnemers.map(d => {
        let score = d.stats.snelheid * 10;
        score -= Math.max(0, d.leeftijd - 28) * 1.5;
        let commentaar = [];

        if (d.tactiek === "Snelle start") {
          score += 4;
          if (Math.random() < 0.12) {
            score = -999;
            commentaar.push(`🚨 ${d.naam} maakt een valse start! Gediskwalificeerd.`);
          } else {
            commentaar.push(`${d.naam} schiet bliksemsnel uit de startblokken!`);
          }
        } else if (d.tactiek === "Finish focus") {
          score += 2;
          commentaar.push(`${d.naam} bewaart zijn energie voor het eind.`);
        } else {
          commentaar.push(`${d.naam} kiest voor balans en controle.`);
        }

        if (Math.random() < 0.05) {
          score -= 8;
          commentaar.push(`🤕 ${d.naam} lijkt geblesseerd!`);
        }

        score += Math.floor(Math.random() * 5);

        return { ...d, score, commentaar };
      });

      let seconden = 0;
      const interval = setInterval(() => {
        if (seconden >= wedstrijdDuur) {
          clearInterval(interval);
          const ranglijst = prestatie.sort((a, b) => b.score - a.score);
          ranglijst.forEach(d => {
            const li = document.createElement("li");
            li.innerHTML = `${d.naam} (${d.land}) ${d.score < 0 ? '<span class='dq'>DQ</span>' : ''}`;
            uitslagBox.appendChild(li);
          });
          commentaarBox.innerHTML += `<p class='highlight'>🏁 De finish is bereikt!</p>`;
        } else {
          const d = prestatie[seconden % prestatie.length];
          const regel = d.commentaar.shift() || `${d.naam} blijft gefocust.`;
          const p = document.createElement("p");
          p.textContent = regel;
          commentaarBox.appendChild(p);
        }
        seconden++;
      }, 1000);
    }
  </script>
</body>
</html>
