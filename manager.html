<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="manager-title">Managerpagina – Multisport-Manager</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="language.js"></script>
</head>
<body>
  <header>
    <h1 data-i18n="manager-heading">👤 Managerpagina</h1>
    <nav>
      <a href="index.html" data-i18n="back-home">⬅️ Terug naar Home</a>
    </nav>
    <div id="taalkeuze"></div>
  </header>

  <main>
    <section id="managerInfo">
      <p><strong data-i18n="player-name-label">Speler:</strong> <span id="spelerNaam">...</span></p>
      <p><strong data-i18n="player-country-label">Land:</strong> <span id="land">...</span></p>
      <p><strong data-i18n="player-mp-label">MP:</strong> <span id="mp">0</span></p>
    </section>

    <section>
      <h2 data-i18n="manager-actions">📂 Acties</h2>
      <ul>
        <li><a href="athletes.html" data-i18n="to-athletes">👥 Atletenbeheer</a></li>
        <li><a href="tactics.html" data-i18n="to-tactics">🎯 Wedstrijdtactieken</a></li>
        <!-- Hier kun je later profiel, resultaten, etc. toevoegen -->
      </ul>
    </section>
  </main>

  <footer>
    <p data-i18n="footer">&copy; 2025 Multisport-Manager – Jouw sport, jouw strategie.</p>
  </footer>
  <script>
    // 🌐 Taalkeuze
    const taalDiv = document.getElementById("taalkeuze");
    const talen = ["nl", "en", "fr", "de"];
    const actieveTaal = localStorage.getItem("taal") || "nl";

    talen.forEach(taal => {
      const knop = document.createElement("button");
      knop.textContent = taal.toUpperCase();
      knop.style.marginRight = "5px";
      if (taal === actieveTaal) knop.disabled = true;
      knop.addEventListener("click", () => {
        localStorage.setItem("taal", taal);
        location.reload();
      });
      taalDiv.appendChild(knop);
    });

    if (typeof vertaalPagina === "function") {
      vertaalPagina();
    }

    // 👤 Gebruiker tonen
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user) {
      window.location.href = "login.html"; // Gebruiker moet ingelogd zijn
    } else {
      document.getElementById("spelerNaam").textContent = user.gebruikersnaam || "Onbekend";
      document.getElementById("land").textContent = user.land || "?";
      document.getElementById("mp").textContent = user.mp ?? 0;
    }
  </script>
</body>
</html>
