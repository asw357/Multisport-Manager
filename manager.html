<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager Home</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .container { max-width: 800px; margin: auto; padding: 20px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .info { text-align: left; }
    .vlag-mp { display: flex; gap: 15px; align-items: center; }
    .buttonbar a { display: inline-block; margin: 10px 10px 0 0; padding: 10px 15px; background: #eee; border-radius: 6px; text-decoration: none; }
    .buttonbar a:hover { background: #ddd; }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <h1>👤 Manager Home</h1>
      <div class="vlag-mp">
        <span id="landVlag">🏳️</span>
        <strong id="mpDisplay">0 MP</strong>
      </div>
    </div>
    <nav>
      <a href="index.html">⬅️ Terug naar Home</a>
      <a href="instellingen.html">⚙️ Instellingen</a>
      <a href="profiel.html">🔐 Profiel</a>
      <a href="logout.html">🚪 Uitloggen</a>
    </nav>
  </header>

  <main class="container">
    <div class="info">
      <p><strong>Speler:</strong> <span id="naam"></span></p>
      <p><strong>Land:</strong> <span id="land"></span></p>
    </div>

    <div class="buttonbar">
      <a href="athletes.html">🏃 Atletenbeheer</a>
      <a href="tactics.html">🧠 Wedstrijdtactieken</a>
      <a href="training.html">🏋️ Training</a>
      <a href="scouting.html">🔍 Scouten</a>
      <a href="edities.html">📅 Edities & Schema</a>
      <a href="medaillespiegel.html">🥇 Medaillespiegel</a>
      <a href="records.html">📈 Records</a>
      <a href="nieuws.html">📰 Nieuws</a>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie – Manager</p>
  </footer>

  <script>
    const user = JSON.parse(localStorage.getItem("loggedInUser"));
    document.getElementById("naam").textContent = user?.gebruikersnaam || "Onbekend";
    document.getElementById("land").textContent = user?.land || "?";
    document.getElementById("mpDisplay").textContent = `${user?.mp || 0} MP`;

    const vlagIcon = {
      "Australië": "🇦🇺", "Bulgarije": "🇧🇬", "Chili": "🇨🇱",
      "Denemarken": "🇩🇰", "IJsland": "🇮🇸", "Duitsland": "🇩🇪",
      "Frankrijk": "🇫🇷", "Griekenland": "🇬🇷"
    };

    document.getElementById("landVlag").textContent = vlagIcon[user?.land] || "🏳️";
  </script>
</body>
</html>
