<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manager Home</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    .dashboard {
      background: #f4f4f4;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
    }
    .dashboard h2 {
      margin-top: 0;
    }
    .info-blok {
      font-size: 18px;
      margin: 10px 0;
    }
    .knoppen {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }
    .knoppen a {
      background: #007acc;
      color: white;
      padding: 12px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      display: inline-block;
      transition: background 0.3s;
    }
    .knoppen a:hover {
      background: #005fa3;
    }
    .nieuws {
      margin-top: 30px;
      background: #fff8e1;
      padding: 15px;
      border-left: 6px solid #ffc107;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <header>
    <h1>📋 Managerpagina</h1>
    <nav><a href="index.html">⬅️ Terug naar Home</a></nav>
  </header>

  <main>
    <section class="dashboard">
      <h2>👤 Manager</h2>
      <div class="info-blok" id="managerInfo">Bezig met laden...</div>
    </section>

    <section class="knoppen">
      <a href="athletes.html">🏃 Atletenbeheer</a>
      <a href="training.html">🎓 Training</a>
      <a href="scouting.html">🔍 Scouten</a>
      <a href="tactics.html">🧠 Tactieken</a>
      <a href="profiel.html">🧾 Profiel</a>
    </section>

    <section class="nieuws">
      <strong>📢 Nieuws:</strong>
      <p>De volgende editie start binnenkort. Vergeet je atleten niet te trainen!</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie</p>
  </footer>

  <script>
    const gebruiker = JSON.parse(localStorage.getItem("loggedInUser"));
    const vlag = gebruiker.land === "Landloos" ? "🏳️" : "🌍";
    const infoHTML = `
      ${vlag} <strong>${gebruiker.gebruikersnaam}</strong><br>
      🏳️ Land: ${gebruiker.land}<br>
      💰 MP: ${gebruiker.mp}
    `;
    document.getElementById("managerInfo").innerHTML = infoHTML;
  </script>
</body>
</html>
