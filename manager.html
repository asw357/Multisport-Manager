<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Pagina - Multisport Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <h1>Manager Pagina</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="logout.html" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Welkom, <span id="manager-name">Manager</span>!</h2>
            <p>Hier kun je je atleten beheren, strategieën aanpassen en prestaties volgen.</p>
            <ul>
                <li><a href="atleten.html">Atletenbeheer</a></li>
                <li><a href="training.html">Training</a></li>
                <li><a href="scouting.html">Scouten</a></li>
                <li><a href="tactieken.html">Tactieken</a></li>
                <li><a href="edities.html">Edities</a></li>
                <li><a href="news.html">Nieuws</a></li>
            </ul>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let user = JSON.parse(localStorage.getItem("loggedInUser"));
            if (!user) {
                alert("Je moet ingelogd zijn om de managerpagina te bekijken.");
                window.location.href = "login.html";
            } else {
                document.getElementById("manager-name").textContent = user.managerName;
            }
        });

        function logout() {
            localStorage.removeItem("loggedInUser");
            alert("Je bent uitgelogd.");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
