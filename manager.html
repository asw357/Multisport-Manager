<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manager Home</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>👤 Manager Home</h1>
    <nav>
      <ul>
        <li><a href="index.html">🏠 Home</a></li>
        <li><a href="logout.html">🚪 Uitloggen</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <h2>Welkom, <span id="managerNaam">...</span></h2>
      <p><strong>Land:</strong> <span id="managerLand">...</span> <img id="landVlag" src="" alt="vlag" style="height:20px; margin-left:10px;"></p>
      <p><strong>MedalPoints (MP):</strong> <span id="managerMP">0</span></p>
    </section>

    <section>
      <h3>🔗 Navigatie</h3>
      <ul>
        <li><a href="athletes.html">👥 Atletenbeheer</a></li>
        <li><a href="tactics.html">🎯 Wedstrijdtactieken</a></li>
        <li><a href="editie_resultaten.html">📜 Deelname & Resultaten</a></li>
        <li><a href="profiel.html">⚙️ Profielinstellingen</a></li>
      </ul>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie – Manager</p>
  </footer>

  <script>
    const user = JSON.parse(localStorage.getItem("loggedInUser"));
    if (!user) {
      alert("Niet ingelogd.");
      window.location.href = "login.html";
    }

    document.getElementById("managerNaam").textContent = user.username;
    document.getElementById("managerLand").textContent = user.land;
    document.getElementById("managerMP").textContent = user.mp || 0;

    // Simpele vlag URL op basis van landnaam
    const vlag = user.land.toLowerCase().replace(" ", "-");
    document.getElementById("landVlag").src = `https://flagcdn.com/h20/${vlag}.png`; // gebruik officiële 2-letter afkorting als upgrade
  </script>
</body>
</html>
