<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🆕 Registreren</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
</head>
<body>
  <main>
    <h1>🆕 Registreren</h1>
    <form id="registerForm">
      <label for="gebruikersnaam">Gebruikersnaam</label>
      <input type="text" id="gebruikersnaam" required />

      <label for="email">E-mailadres</label>
      <input type="email" id="email" required />

      <label for="wachtwoord">Wachtwoord</label>
      <input type="password" id="wachtwoord" required />

      <button type="submit">Registreren</button>
    </form>
  </main>

  <script>
    document.getElementById("registerForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const gebruikersnaam = document.getElementById("gebruikersnaam").value;
      const email = document.getElementById("email").value;
      const wachtwoord = document.getElementById("wachtwoord").value;

      // 1. Registreer bij Supabase Auth
      const { user, error: authError } = await supabase.auth.signUp({
        email,
        password: wachtwoord
      });

      if (authError) {
        alert("Fout bij registratie: " + authError.message);
        return;
      }

      // 2. Haal een land uit landentoewijzing (volgorde gebaseerd)
      const { data: landen } = await supabase.from("landentoewijzing").select("*").order("volgorde", { ascending: true });
      const toegewezenLand = landen[Math.floor(Math.random() * landen.length)].naam;

      // 3. Voeg toe aan users-tabel
      await supabase.from("users").insert([{
        email,
        gebruikersnaam,
        land: toegewezenLand,
        taal: "nl",
        mp: 100 // standaard start MP
      }]);

      // 4. Haal limieten op
      const { data: limieten } = await supabase.from("limieten").select("*");

      // 5. Maak per limietregel startatleten aan
      for (const limiet of limieten) {
        for (let i = 0; i < limiet.start; i++) {
          const nieuweAtleet = {
            naam: `Atleet ${i + 1} – ${limiet.onderdeel}`,
            sport: limiet.sport,
            onderdeel: limiet.onderdeel,
            geslacht: limiet.geslacht,
            land: toegewezenLand,
            leeftijd: 18 + Math.floor(Math.random() * 10),
            owner: email,
            stats: {
              snelheid: +(Math.random() * 2 + 3).toFixed(1),
              kracht: +(Math.random() * 2 + 3).toFixed(1),
              techniek: +(Math.random() * 2 + 3).toFixed(1)
            }
          };

          await supabase.from("atleten").insert([nieuweAtleet]);
        }
      }

      alert("Registratie gelukt! Je kunt nu inloggen.");
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
