<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registratie - Multisport Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <h1>Registreren</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="register-section">
            <h3>Maak een account aan</h3>
            <form id="register-form" class="form-container">
                <input type="text" id="manager-name" placeholder="Manager Naam" required>
                <input type="email" id="email" placeholder="E-mail" required>
                <input type="password" id="password" placeholder="Wachtwoord" required>
                <button type="submit">Registreer</button>
            </form>
            <p id="register-message"></p>
        </section>
    </main>

    <script>
        document.getElementById("register-form").addEventListener("submit", function(event) {
            event.preventDefault();
            let managerName = document.getElementById("manager-name").value;
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;
            
            if (managerName && email && password) {
                let assignedCountry = assignNextAvailableCountry();
                let userData = { managerName, email, password, assignedCountry };
                localStorage.setItem("user", JSON.stringify(userData));
                localStorage.setItem("loggedInUser", JSON.stringify(userData));
                
                // Koppel starterslijst atleten aan gebruiker
                assignStarterAthletes(userData);
                
                document.getElementById("register-message").innerText = `Welkom, ${managerName}! Je hebt het land ${assignedCountry} gekregen.`;
                
                setTimeout(() => { window.location.href = "manager.html"; }, 2000);
            }
        });
        
        function assignNextAvailableCountry() {
            const countries = JSON.parse(localStorage.getItem("countries")) || ["Australie", "Bulgarije", "Chili", "Denemarken", "Ijsland", "Duitsland", "Frankrijk", "Griekenland"];
            let usedCountries = JSON.parse(localStorage.getItem("usedCountries")) || [];
            let availableCountry = countries.find(c => !usedCountries.includes(c)) || "Geen beschikbaar land";
            usedCountries.push(availableCountry);
            localStorage.setItem("usedCountries", JSON.stringify(usedCountries));
            return availableCountry;
        }
        
        function assignStarterAthletes(user) {
            let starters = JSON.parse(localStorage.getItem("starterAthletes")) || [];
            let userAthletes = JSON.parse(localStorage.getItem("athletes")) || [];
            
            starters.forEach(athlete => {
                userAthletes.push({
                    name: athlete.name,
                    sport: athlete.sport,
                    event: athlete.event,
                    gender: athlete.gender,
                    country: user.assignedCountry,
                    speed: Math.floor(Math.random() * 10) + 1,
                    strength: Math.floor(Math.random() * 10) + 1
                });
            });
            localStorage.setItem("athletes", JSON.stringify(userAthletes));
        }
    </script>
</body>
</html>
