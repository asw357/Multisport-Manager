<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📝 Registreren</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    form {
      max-width: 400px;
      margin: auto;
      background: #f4f4f4;
      padding: 20px;
      border-radius: 6px;
    }
    input, button {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1>📝 Registreren</h1>
    <nav><a href="index.html">⬅️ Terug naar Home</a></nav>
  </header>

  <main>
    <form id="registerForm">
      <label for="gebruikersnaam">Gebruikersnaam</label>
      <input type="text" id="gebruikersnaam" required />

      <label for="email">E-mail</label>
      <input type="email" id="email" required />

      <label for="wachtwoord">Wachtwoord</label>
      <input type="password" id="wachtwoord" required />

      <button type="submit">✅ Registreren</button>
    </form>
  </main>
  <script>
    function genereerNaam(land) {
      const voornamen = ["Alex", "Liam", "Sven", "Noah", "Julian"];
      const achternamen = ["Jansen", "Kovacs", "Nguyen", "Petrov", "Smith"];
      return `${voornamen[Math.floor(Math.random() * voornamen.length)]} ${achternamen[Math.floor(Math.random() * achternamen.length)]}`;
    }

    async function genereerAtleten(gebruiker) {
      const { data: sporten } = await supabase.from("sporten").select("*");
      const { data: limieten } = await supabase.from("limieten").select("*");

      let nieuweAtleten = [];

      sporten.forEach(s => {
        const match = limieten.find(l =>
          l.sport === s.sport && l.geslacht === s.geslacht && l.onderdeel === s.onderdeel
        );
        const start = match?.start || 0;

        for (let i = 0; i < start; i++) {
          nieuweAtleten.push({
            naam: genereerNaam(gebruiker.land),
            leeftijd: Math.floor(Math.random() * 10) + 18,
            sport: s.sport,
            geslacht: s.geslacht,
            onderdeel: s.onderdeel,
            stats: {
              snelheid: Math.random() * 100,
              kracht: Math.random() * 100,
              techniek: Math.random() * 100
            },
            owner: gebruiker.email
          });
        }
      });

      if (nieuweAtleten.length > 0) {
        await supabase.from("atleten").insert(nieuweAtleten);
      }
    }

    document.getElementById("registerForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const gebruikersnaam = document.getElementById("gebruikersnaam").value;
      const email = document.getElementById("email").value;
      const wachtwoord = document.getElementById("wachtwoord").value;

      const { data: check } = await supabase.from("users").select("*").eq("email", email);
      if (check.length > 0) {
        alert("❌ Dit e-mailadres is al geregistreerd.");
        return;
      }

      const { data: queue } = await supabase.from("landentoewijzing").select("*").order("volgorde");
      const { data: allUsers } = await supabase.from("users").select("id");

      const toegewezenLand = queue[allUsers.length % queue.length]?.naam || "Landloos";

      const gebruiker = {
        gebruikersnaam,
        email,
        wachtwoord,
        land: toegewezenLand,
        mp: 100
      };

      const { data: inserted } = await supabase.from("users").insert([gebruiker]).select();
      localStorage.setItem("loggedInUser", JSON.stringify(inserted[0]));

      await genereerAtleten(inserted[0]);
      window.location.href = "manager.html";
    });
  </script>
</body>
</html>
