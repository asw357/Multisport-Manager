<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registreren</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    form {
      max-width: 400px;
      margin: auto;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 8px;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }
    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>📋 Registreren</h1>
    <nav><a href="index.html">⬅️ Terug naar Home</a></nav>
  </header>

  <main>
    <form id="registerForm">
      <label for="gebruikersnaam">Gebruikersnaam</label>
      <input type="text" id="gebruikersnaam" required />

      <label for="email">E-mailadres</label>
      <input type="email" id="email" required />

      <label for="wachtwoord">Wachtwoord</label>
      <input type="password" id="wachtwoord" required />

      <button type="submit">✅ Registreren</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie – Registratie</p>
  </footer>

  <script>
    const landenQueue = JSON.parse(localStorage.getItem("country_queue")) || [
      "Australië", "Bulgarije", "Chili", "Denemarken", "IJsland", "Duitsland", "Frankrijk", "Griekenland"
    ];

    function genereerNaam(land) {
      const voornamen = ["Alex", "Liam", "Sven", "Noah", "Julian", "Max", "Kai"];
      const achternamen = ["Jansen", "Kovacs", "Nguyen", "Petrov", "Dimitrov", "Smith", "Garcia"];
      return `${voornamen[Math.floor(Math.random() * voornamen.length)]} ${achternamen[Math.floor(Math.random() * achternamen.length)]}`;
    }

    function genereerAtleten(gebruiker) {
      const sporten = JSON.parse(localStorage.getItem("sportonderdelen")) || [];
      const limieten = JSON.parse(localStorage.getItem("limieten")) || {};
      const alleAtleten = JSON.parse(localStorage.getItem("atleten")) || [];

      let nieuwe = [];

      sporten.forEach(s => {
        const sleutel = `${s.sport} - ${s.geslacht} - ${s.onderdeel}`;
        const limiet = limieten[sleutel];
        const start = limiet?.start || 0;

        for (let i = 0; i < start; i++) {
          nieuwe.push({
            id: Date.now() + Math.random(),
            naam: genereerNaam(gebruiker.land),
            leeftijd: Math.floor(Math.random() * 10) + 18,
            sport: s.sport,
            geslacht: s.geslacht,
            onderdeel: s.onderdeel,
            owner: gebruiker.email,
            stats: {
              snelheid: Math.random() * 100,
              kracht: Math.random() * 100,
              techniek: Math.random() * 100
            }
          });
        }
      });

      localStorage.setItem("atleten", JSON.stringify([...alleAtleten, ...nieuwe]));
    }

    document.getElementById("registerForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const gebruikersnaam = document.getElementById("gebruikersnaam").value;
      const email = document.getElementById("email").value;
      const wachtwoord = document.getElementById("wachtwoord").value;

      const users = JSON.parse(localStorage.getItem("users")) || [];
      if (users.find(u => u.email === email)) {
        alert("Er bestaat al een account met dit e-mailadres.");
        return;
      }

      const land = landenQueue.shift() || "Landloos";
      localStorage.setItem("country_queue", JSON.stringify(landenQueue));

      const nieuweGebruiker = {
        gebruikersnaam,
        email,
        wachtwoord,
        land,
        mp: 100
      };

      users.push(nieuweGebruiker);
      localStorage.setItem("users", JSON.stringify(users));
      localStorage.setItem("loggedInUser", JSON.stringify(nieuweGebruiker));

      genereerAtleten(nieuweGebruiker);
      window.location.href = "manager.html";
    });
  </script>
</body>
</html>
