<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multisport Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <h1>Multisport Manager</h1>
        <nav>
            <ul id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section class="welcome-section">
            <h2>Welcome to Multisport Manager!</h2>
            <p>Manage your national team, train athletes, scout for new talent, and compete in global sports competitions.</p>
        </section>
        
        <section class="register-section">
            <h3>Register to Get Started</h3>
            <form id="register-form" class="form-container">
                <input type="text" id="manager-name" placeholder="Enter your Manager Name" required>
                <input type="email" id="email" placeholder="Enter your Email" required>
                <input type="password" id="password" placeholder="Enter your Password" required>
                <button type="submit">Register</button>
            </form>
            <p id="register-message"></p>
        </section>
    </main>
    
    <script>
        document.getElementById("register-form").addEventListener("submit", function(event) {
            event.preventDefault();
            let managerName = document.getElementById("manager-name").value;
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;
            
            if (managerName && email && password) {
                let assignedCountry = assignNextAvailableCountry();
                let userData = { managerName, email, password, assignedCountry };
                localStorage.setItem("user", JSON.stringify(userData));
                localStorage.setItem("loggedInUser", JSON.stringify(userData));
                
                document.getElementById("register-message").innerText = `Welcome, ${managerName}! You have been assigned to ${assignedCountry}.`;
                
                setTimeout(() => { 
                    window.location.href = "manager.html"; 
                }, 2000);
            }
        });
        
        function assignNextAvailableCountry() {
            const countries = ["Australie", "Bulgarije", "Chili", "Denemarken", "Ijsland", "Duitsland", "Frankrijk", "Griekenland"];
            let usedCountries = JSON.parse(localStorage.getItem("usedCountries")) || [];
            let availableCountry = countries.find(c => !usedCountries.includes(c)) || "No Country Available";
            usedCountries.push(availableCountry);
            localStorage.setItem("usedCountries", JSON.stringify(usedCountries));
            return availableCountry;
        }
    </script>
</body>
</html>
