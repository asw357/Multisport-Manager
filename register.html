<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="register-title">Registreren – Multisport-Manager</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="language.js"></script>
</head>
<body>
  <header>
    <h1 data-i18n="register-heading">🆕 Registreren</h1>
    <nav>
      <a href="index.html" data-i18n="back-home">⬅️ Terug naar Home</a>
    </nav>
    <div id="taalkeuze"></div>
  </header>

  <main>
    <form id="registerForm">
      <label for="username" data-i18n="username">Gebruikersnaam:</label><br/>
      <input type="text" id="username" required /><br/>

      <label for="email" data-i18n="email">E-mailadres:</label><br/>
      <input type="email" id="email" required /><br/>

      <label for="password" data-i18n="password">Wachtwoord:</label><br/>
      <input type="password" id="password" required /><br/>

      <button type="submit" data-i18n="register-button">Account aanmaken</button>
    </form>
    <p id="melding" style="color: red;"></p>
  </main>

  <footer>
    <p data-i18n="footer">&copy; 2025 Multisport-Manager – Jouw sport, jouw strategie.</p>
  </footer>
  <script>
    // 🌐 Taal
    const taalDiv = document.getElementById("taalkeuze");
    const talen = ["nl", "en", "fr", "de"];
    const actieveTaal = localStorage.getItem("taal") || "nl";

    talen.forEach(taal => {
      const knop = document.createElement("button");
      knop.textContent = taal.toUpperCase();
      knop.style.marginRight = "5px";
      if (taal === actieveTaal) knop.disabled = true;
      knop.addEventListener("click", () => {
        localStorage.setItem("taal", taal);
        location.reload();
      });
      taalDiv.appendChild(knop);
    });

    if (typeof vertaalPagina === "function") {
      vertaalPagina();
    }

    // 📝 Registratie
    const form = document.getElementById("registerForm");
    const melding = document.getElementById("melding");

    form.addEventListener("submit", e => {
      e.preventDefault();

      const gebruikersnaam = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim().toLowerCase();
      const wachtwoord = document.getElementById("password").value;

      if (!gebruikersnaam || !email || !wachtwoord) {
        melding.textContent = "Vul alle velden in.";
        return;
      }

      // ✅ Landentoewijzing met fallback
      let countryQueue = JSON.parse(localStorage.getItem("countryQueue"));

      if (!Array.isArray(countryQueue) || countryQueue.length === 0) {
        countryQueue = [
          "Australië", "Bulgarije", "Chili", "Denemarken", "IJsland", "Duitsland", "Frankrijk", "Griekenland"
        ];
        localStorage.setItem("countryQueue", JSON.stringify(countryQueue));
      }

      const toegewezenLand = countryQueue.shift();
      localStorage.setItem("countryQueue", JSON.stringify(countryQueue));

      const startMp = 50;

      const user = {
        gebruikersnaam,
        email,
        wachtwoord,
        land: toegewezenLand,
        mp: startMp
      };

      localStorage.setItem("user", JSON.stringify(user));

      // Voeg toe aan accounts
      const accounts = JSON.parse(localStorage.getItem("accounts")) || [];
      accounts.push(user);
      localStorage.setItem("accounts", JSON.stringify(accounts));

      window.location.href = "index.html";
    });
  </script>
</body>
</html>
