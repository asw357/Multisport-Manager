<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📝 Registreren</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    form {
      max-width: 400px;
      margin: auto;
      background: #f4f4f4;
      padding: 20px;
      border-radius: 6px;
    }
    input, button {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1>📝 Registreren</h1>
    <nav><a href="index.html">⬅️ Terug naar Home</a></nav>
  </header>

  <main>
    <form id="registerForm">
      <label for="gebruikersnaam">Gebruikersnaam</label>
      <input type="text" id="gebruikersnaam" required />

      <label for="email">E-mail</label>
      <input type="email" id="email" required />

      <label for="wachtwoord">Wachtwoord</label>
      <input type="password" id="wachtwoord" required />

      <button type="submit">✅ Registreren</button>
    </form>
  </main>
  <script>
    document.getElementById("registerForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const gebruikersnaam = document.getElementById("gebruikersnaam").value;
      const email = document.getElementById("email").value;
      const wachtwoord = document.getElementById("wachtwoord").value;

      const { data: check } = await supabase.from("users").select("*").eq("email", email);
      if (check.length > 0) {
        alert("Dit e-mailadres is al geregistreerd.");
        return;
      }

      const { data: landen } = await supabase.from("landentoewijzing").select("*").order("volgorde");
      const { data: allUsers } = await supabase.from("users").select("*");
      const toegewezenLand = landen[allUsers.length % landen.length]?.naam || "Landloos";

      const gebruiker = {
        gebruikersnaam,
        email,
        wachtwoord,
        land: toegewezenLand,
        mp: 100
      };

      const { data: inserted } = await supabase.from("users").insert([gebruiker]).select();
      localStorage.setItem("loggedInUser", JSON.stringify(inserted[0]));
      window.location.href = "manager.html";
    });
  </script>
</body>
</html>
