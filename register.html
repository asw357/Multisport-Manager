<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registreren</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    form {
      max-width: 400px;
      margin: auto;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 8px;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }
    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>📋 Registreren</h1>
    <nav><a href="index.html">⬅️ Terug naar Home</a></nav>
  </header>

  <main>
    <form id="registerForm">
      <label for="gebruikersnaam">Gebruikersnaam</label>
      <input type="text" id="gebruikersnaam" required />

      <label for="email">E-mailadres</label>
      <input type="email" id="email" required />

      <label for="wachtwoord">Wachtwoord</label>
      <input type="password" id="wachtwoord" required />

      <button type="submit">✅ Registreren</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie – Registratie</p>
  </footer>

  <script>
    function genereerNaam(land) {
      const voornamen = ["Alex", "Liam", "Sven", "Noah", "Julian", "Max", "Kai"];
      const achternamen = ["Jansen", "Kovacs", "Nguyen", "Petrov", "Dimitrov", "Smith", "Garcia"];
      return `${voornamen[Math.floor(Math.random() * voornamen.length)]} ${achternamen[Math.floor(Math.random() * achternamen.length)]}`;
    }

    async function genereerAtleten(gebruiker) {
      const { data: sporten } = await supabase.from("sportonderdelen").select("*");
      const { data: limieten } = await supabase.from("limieten").select("*");
      const atleten = [];

      sporten.forEach((s) => {
        const limiet = limieten.find(l => l.sport === s.sport && l.geslacht === s.geslacht && l.onderdeel === s.onderdeel);
        const start = limiet?.startaantal || 0;

        for (let i = 0; i < start; i++) {
          atleten.push({
            naam: genereerNaam(gebruiker.land),
            leeftijd: Math.floor(Math.random() * 10) + 18,
            sport: s.sport,
            geslacht: s.geslacht,
            onderdeel: s.onderdeel,
            owner: gebruiker.email,
            stats: {
              snelheid: Math.random() * 100,
              kracht: Math.random() * 100,
              techniek: Math.random() * 100
            }
          });
        }
      });

      if (atleten.length > 0) {
        await supabase.from("atleten").insert(atleten);
      }
    }

    document.getElementById("registerForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const gebruikersnaam = document.getElementById("gebruikersnaam").value;
      const email = document.getElementById("email").value;
      const wachtwoord = document.getElementById("wachtwoord").value;

      const { data: bestaandeGebruiker } = await supabase.from("users").select("*").eq("email", email);
      if (bestaandeGebruiker.length > 0) {
        alert("Er bestaat al een account met dit e-mailadres.");
        return;
      }

      const { data: landen } = await supabase.from("landentoewijzing").select("*").order("volgorde");
      const { data: alleUsers } = await supabase.from("users").select("id");

      const toegewezenLand = landen[alleUsers.length % landen.length]?.naam || "Landloos";

      const nieuweGebruiker = {
        gebruikersnaam,
        email,
        wachtwoord,
        land: toegewezenLand,
        mp: 100
      };

      const { data: inserted } = await supabase.from("users").insert([nieuweGebruiker]).select();
      localStorage.setItem("loggedInUser", JSON.stringify(inserted[0]));

      await genereerAtleten(inserted[0]);
      window.location.href = "manager.html";
    });
  </script>
</body>
</html>
