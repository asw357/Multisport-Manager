<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📝 Registreren</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    form {
      max-width: 400px;
      margin: auto;
      background: #f4f4f4;
      padding: 20px;
      border-radius: 6px;
    }
    input, button {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1>📝 Registreren</h1>
    <nav><a href="index.html">⬅️ Terug naar Home</a></nav>
  </header>

  <main>
    <form id="registerForm">
      <label for="gebruikersnaam">Gebruikersnaam</label>
      <input type="text" id="gebruikersnaam" required />

      <label for="email">E-mailadres</label>
      <input type="email" id="email" required />

      <label for="wachtwoord">Wachtwoord</label>
      <input type="password" id="wachtwoord" required />

      <button type="submit">✅ Registreren</button>
    </form>
  </main>
  <script>
    async function genereerAtleten(email, land) {
      const { data: sporten } = await supabase.from("sporten").select("*");
      const { data: limieten } = await supabase.from("limieten").select("*");

      const atleten = [];

      sporten.forEach(s => {
        const sleutel = `${s.sport} - ${s.geslacht} - ${s.onderdeel}`;
        const limiet = limieten.find(l => l.sleutel === sleutel);
        const aantal = limiet?.start || 0;

        for (let i = 0; i < aantal; i++) {
          const naam = `Atleet ${Math.floor(Math.random() * 1000)}`;
          const leeftijd = Math.floor(Math.random() * 10) + 18;
          const stats = {
            snelheid: Math.random() * 100,
            kracht: Math.random() * 100,
            techniek: Math.random() * 100
          };

          atleten.push({
            owner: email,
            naam,
            leeftijd,
            land,
            sport: s.sport,
            geslacht: s.geslacht,
            onderdeel: s.onderdeel,
            stats
          });
        }
      });

      if (atleten.length > 0) {
        await supabase.from("atleten").insert(atleten);
      }
    }

    document.getElementById("registerForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const gebruikersnaam = document.getElementById("gebruikersnaam").value;
      const email = document.getElementById("email").value;
      const wachtwoord = document.getElementById("wachtwoord").value;

      const { data: existing } = await supabase.from("users").select("*").eq("email", email);
      if (existing.length > 0) {
        alert("❌ Dit e-mailadres is al geregistreerd.");
        return;
      }

      const { data: landen } = await supabase.from("landentoewijzing").select("*").order("volgorde");
      const { data: users } = await supabase.from("users").select("id");
      const land = landen[users.length % landen.length]?.naam || "Landloos";

      const gebruiker = {
        gebruikersnaam,
        email,
        wachtwoord,
        land,
        mp: 100
      };

      const { data: inserted } = await supabase.from("users").insert([gebruiker]).select();
      localStorage.setItem("loggedInUser", JSON.stringify(inserted[0]));

      await genereerAtleten(email, land);

      window.location.href = "manager.html";
    });
  </script>
</body>
</html>
