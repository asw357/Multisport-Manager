<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registreren – Multisport-Manager</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>
  <main>
    <h1>Registreren</h1>

    <form id="registerForm">
      <label for="email">E-mailadres:</label>
      <input type="email" id="email" required />

      <label for="password">Wachtwoord:</label>
      <input type="password" id="password" required />

      <label for="managernaam">Managernaam:</label>
      <input type="text" id="managernaam" required />

      <button type="submit">Account aanmaken</button>
    </form>

    <p id="melding" style="color:red;"></p>
  </main>

  <script>
    const supabase = supabase.createClient(
      "https://bhpmdtivyripebburakf.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJocG1kdGl2eXJpcGViYnVyYWtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM2Mjc4NzYsImV4cCI6MjA2OTIwMzg3Nn0.kb733XLzUnc-aTbW_RzpeVJqylZ608egVShDCgIJkKI"
    );

    const ADMIN_EMAIL = "wilcoboesveld12@hotmail.com";

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const managernaam = document.getElementById("managernaam").value;

      const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
        email,
        password
      });

      if (signUpError) {
        document.getElementById("melding").textContent = signUpError.message;
        return;
      }

      const userId = signUpData.user.id;

      // Zoek eerst beschikbaar land
      const { data: landen, error: landError } = await supabase
        .from("landen")
        .select("*")
        .eq("toegekend", false)
        .order("volgorde", { ascending: true })
        .limit(1);

      if (landError || landen.length === 0) {
        document.getElementById("melding").textContent = "Geen landen beschikbaar voor toewijzing.";
        return;
      }

      const gekozenLand = landen[0].land;

      // Voeg gebruiker toe aan users-tabel
      const { error: insertError } = await supabase.from("users").insert([
        {
          id: userId,
          email,
          managernaam,
          land: gekozenLand,
          is_admin: email.toLowerCase() === ADMIN_EMAIL
        }
      ]);

      if (insertError) {
        document.getElementById("melding").textContent = "Fout bij opslaan gebruiker: " + insertError.message;
        return;
      }

      // Zet land op toegekend = true
      await supabase
        .from("landen")
        .update({ toegekend: true })
        .eq("land", gekozenLand);

      // Klaar → door naar dashboard
      window.location.href = "dashboard.html";
    });
  </script>
</body>
</html>
