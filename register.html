<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📝 Registreren</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    form {
      max-width: 400px;
      margin: auto;
      background: #f4f4f4;
      padding: 20px;
      border-radius: 6px;
    }
    input, button {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1>📝 Registreren</h1>
    <nav><a href="index.html">⬅️ Terug naar Home</a></nav>
  </header>

  <main>
    <form id="registerForm">
      <label for="gebruikersnaam">Gebruikersnaam</label>
      <input type="text" id="gebruikersnaam" required />

      <label for="email">E-mail</label>
      <input type="email" id="email" required />

      <label for="wachtwoord">Wachtwoord</label>
      <input type="password" id="wachtwoord" required />

      <button type="submit">✅ Registreren</button>
    </form>
  </main>
  <script>
    async function registreer(e) {
      e.preventDefault();
      const gebruikersnaam = document.getElementById("gebruikersnaam").value;
      const email = document.getElementById("email").value;
      const wachtwoord = document.getElementById("wachtwoord").value;

      const { data: bestaandeGebruiker } = await supabase
        .from("users")
        .select("email")
        .eq("email", email);

      if (bestaandeGebruiker.length > 0) {
        alert("❌ Dit e-mailadres is al in gebruik.");
        return;
      }

      const { data: landenrij } = await supabase
        .from("landentoewijzing")
        .select("*")
        .order("volgorde");

      const { data: gebruikers } = await supabase.from("users").select("id");
      const landIndex = gebruikers.length % landenrij.length;
      const land = landenrij[landIndex]?.naam || "Landloos";

      const nieuweGebruiker = {
        gebruikersnaam,
        email,
        wachtwoord,
        land,
        mp: 100,
        taal: "nl",
        meldingen: "aan"
      };

      const { data: inserted, error } = await supabase
        .from("users")
        .insert([nieuweGebruiker])
        .select();

      if (error) {
        alert("❌ Fout bij registratie.");
        return;
      }

      localStorage.setItem("loggedInUser", JSON.stringify(inserted[0]));
      window.location.href = "manager.html";
    }

    document.getElementById("registerForm").addEventListener("submit", registreer);
  </script>
</body>
</html>
