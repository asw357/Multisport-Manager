<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registreren</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Account Registreren</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="login.html">Inloggen</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <form id="registerForm">
      <label for="username">Gebruikersnaam:</label><br />
      <input type="text" id="username" required /><br />

      <label for="email">E-mail:</label><br />
      <input type="email" id="email" required /><br />

      <label for="password">Wachtwoord:</label><br />
      <input type="password" id="password" required /><br /><br />

      <button type="submit">Registreren</button>
    </form>

    <div id="result"></div>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie</p>
  </footer>

  <script>
    document.getElementById("registerForm").addEventListener("submit", function (e) {
      e.preventDefault();

      // Simulatie: landentoewijzing ophalen uit een queue (later: data/country_queue.json)
      const landen = [
        "Australië", "Bulgarije", "Chili", "Denemarken", "IJsland", "Duitsland",
        "Frankrijk", "Griekenland", "Hongarije", "Italië"
      ];

      // Ophalen hoeveel gebruikers er al zijn (simulatie)
      const existingUsers = JSON.parse(localStorage.getItem("users")) || [];
      const toegewezenLand = landen[existingUsers.length % landen.length];

      const user = {
        username: document.getElementById("username").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        land: toegewezenLand
      };

      existingUsers.push(user);
      localStorage.setItem("users", JSON.stringify(existingUsers));

      document.getElementById("result").innerHTML =
        `<p>Registratie succesvol! Je bent toegewezen aan: <strong>${toegewezenLand}</strong>.</p>`;
    });
  </script>
</body>
</html>
