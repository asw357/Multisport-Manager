<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registreren - Multisport-Manager</title>
</head>
<body>
  <h1 id="register-title">Registreren</h1>

  <form id="register-form">
    <label for="managername">Managernaam:</label><br />
    <input type="text" id="managername" required /><br /><br />

    <label for="email">E-mailadres:</label><br />
    <input type="email" id="email" required /><br /><br />

    <label for="password">Wachtwoord:</label><br />
    <input type="password" id="password" required /><br /><br />

    <button type="submit">Registreer</button>
  </form>

  <p id="message"></p>

  <script src="lang.js"></script>
  <script src="supabase.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const managername = document.getElementById('managername').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
        email, password
      });

      if (signUpError) {
        document.getElementById('message').innerText = signUpError.message;
        return;
      }

      const userId = signUpData.user.id;

      // Zoek een vrij land
      const { data: countryData, error: countryError } = await supabase
        .from('countries')
        .select('id')
        .eq('assigned', false)
        .limit(1)
        .single();

      if (countryError || !countryData) {
        document.getElementById('message').innerText = "Geen vrije landen beschikbaar.";
        return;
      }

      // Gebruiker opslaan in users_extra
      await supabase.from('users_extra').insert({
        user_id: userId,
        manager_name: managername,
        country_id: countryData.id,
        mp: 100,
        last_login: new Date().toISOString()
      });

      // Markeer land als toegewezen
      await supabase.from('countries')
        .update({ assigned: true })
        .eq('id', countryData.id);

      // Ga naar select_sports.html
      window.location.href = "select_sports.html";
    });
  </script>
</body>
</html>
