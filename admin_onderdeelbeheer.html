<script>
  async function vulBestaandeGegevens() {
    const [sport, discipline, onderdeel, geslacht] = document.getElementById("onderdeelSelect").value.split("|");

    // Limieten ophalen
    const { data: limiet } = await supabase
      .from("limieten")
      .select("*")
      .eq("sport", sport)
      .eq("discipline", discipline)
      .eq("onderdeel", onderdeel)
      .eq("geslacht", geslacht);

    if (limiet?.length) {
      document.getElementById("maxDeelnemers").value = limiet[0].max_deelnemers || "";
      document.getElementById("maxPerLand").value = limiet[0].max_per_land || "";
    }

    // Simulatieregel ophalen
    const { data: sim } = await supabase
      .from("simulatie")
      .select("*")
      .eq("sport", sport)
      .eq("discipline", discipline)
      .eq("onderdeel", onderdeel)
      .eq("geslacht", geslacht)
      .limit(1);

    if (sim?.length) {
      document.getElementById("statNaam").value = sim[0].stat_naam || "";
      document.getElementById("statMin").value = sim[0].min_waarde || "";
      document.getElementById("statMax").value = sim[0].max_waarde || "";
      document.getElementById("statEenheid").value = sim[0].eenheid || "";
    }

    // Format ophalen (tijdslot automatisch previewen)
    await genereerSchema();
  }

  document.getElementById("onderdeelSelect").addEventListener("change", vulBestaandeGegevens);
</script>
<script>
  async function opslaanLimieten() {
    const [sport, discipline, onderdeel, geslacht] = document.getElementById("onderdeelSelect").value.split("|");

    const nieuweLimiet = {
      sport,
      discipline,
      onderdeel,
      geslacht,
      max_deelnemers: parseInt(document.getElementById("maxDeelnemers").value),
      max_per_land: parseInt(document.getElementById("maxPerLand").value),
      min_landen: parseInt(document.getElementById("minLanden").value) || null,
      teamvorm: document.getElementById("vorm").value,
      pogingen: parseInt(document.getElementById("pogingen").value) || null,
      races: parseInt(document.getElementById("races").value) || null
    };

    await supabase.from("limieten").upsert(nieuweLimiet, {
      onConflict: ["sport", "discipline", "onderdeel", "geslacht"]
    });

    alert("Limieten opgeslagen");
  }
</script>
<button onclick="opslaanLimieten()">💾 Opslaan limieten & structuur</button>
<script>
  async function opslaanSimulatie() {
    const [sport, discipline, onderdeel, geslacht] = document.getElementById("onderdeelSelect").value.split("|");

    const nieuweSim = {
      sport,
      discipline,
      onderdeel,
      geslacht,
      stat_naam: document.getElementById("statNaam").value,
      min_waarde: parseFloat(document.getElementById("statMin").value),
      max_waarde: parseFloat(document.getElementById("statMax").value),
      eenheid: document.getElementById("statEenheid").value || null
    };

    await supabase.from("simulatie").upsert(nieuweSim, {
      onConflict: ["sport", "discipline", "onderdeel", "geslacht"]
    });

    alert("Simulatieregel opgeslagen");
  }
</script>
