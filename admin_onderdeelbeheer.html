<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎯 Onderdeelbeheer – Wedstrijdstructuur</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    section { background: #f8f8f8; padding: 20px; margin-bottom: 30px; border-radius: 6px; }
    h2 { margin-top: 0; }
    label, select, input, button {
      display: block;
      margin: 10px 0;
      width: 100%;
      max-width: 600px;
    }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 6px; text-align: left; }
    th { background: #eee; }
  </style>
</head>
<body>
  <h1>🎯 Onderdeelbeheer</h1>
  <nav><a href="admin.html">⬅️ Terug naar Admin</a></nav>

  <section>
    <h2>1️⃣ Kies editie & sportonderdeel</h2>
    <label for="editieSelect">Editie</label>
    <select id="editieSelect"></select>

    <label for="onderdeelSelect">Sport → Discipline → Onderdeel → Geslacht</label>
    <select id="onderdeelSelect"></select>

    <label for="finaleDag">Finale dag</label>
    <input type="number" id="finaleDag" />

    <label for="tijdslotFinale">Tijdslot finale</label>
    <select id="tijdslotFinale">
      <option value="Ochtend">Ochtend</option>
      <option value="Middag">Middag</option>
      <option value="Avond">Avond</option>
    </select>
    <button onclick="genereerSchema()">📅 Genereer automatisch schema</button>
  </section>

  <section>
    <h2>2️⃣ Structuur & limieten</h2>
    <label for="maxDeelnemers">Max. deelnemers</label>
    <input type="number" id="maxDeelnemers" />

    <label for="maxPerLand">Max. per land</label>
    <input type="number" id="maxPerLand" />

    <label for="minLanden">Minimaal aantal landen</label>
    <input type="number" id="minLanden" />

    <label for="vorm">Type onderdeel</label>
    <select id="vorm">
      <option value="individueel">Individueel</option>
      <option value="team">Team</option>
      <option value="estafette">Estafette</option>
    </select>

    <label for="pogingen">Aantal pogingen</label>
    <input type="number" id="pogingen" />

    <label for="races">Aantal races</label>
    <input type="number" id="races" />

    <button onclick="opslaanLimieten()">💾 Opslaan limieten & structuur</button>
  </section>
  <section>
    <h2>3️⃣ Automatisch gegenereerd schema</h2>
    <div id="schemaPreview">⚠️ Nog geen onderdeel geselecteerd.</div>
    <button onclick="opslaanSchema()">💾 Opslaan in wedstrijdschema</button>
  </section>

  <section>
    <h2>4️⃣ Opslaan als sjabloon</h2>
    <label><input type="checkbox" id="opslaanAlsTemplate" /> Sla op als standaardstructuur</label>
  </section>

  <section>
    <h2>5️⃣ Simulatieregels</h2>
    <label for="statNaam">Statnaam</label>
    <input id="statNaam" placeholder="bijv. snelheid" />

    <label for="statMin">Minimale waarde</label>
    <input type="number" id="statMin" />

    <label for="statMax">Maximale waarde</label>
    <input type="number" id="statMax" />

    <label for="statEenheid">Eenheid</label>
    <input id="statEenheid" placeholder="bijv. sec" />

    <button onclick="opslaanSimulatie()">💾 Opslaan simulatieregel</button>
  </section>

  <section>
    <h2>6️⃣ Snelle planning</h2>
    <button onclick="genereerVolledigePlanning()">⚡ Plan alle onderdelen binnen deze sport</button>
  </section>

  <section>
    <h2>7️⃣ Simulatietest</h2>
    <button onclick="testSimulatie()">🎮 Test simulatie</button>
    <div id="simulatiePreview">⏳ Resultaten komen hier...</div>
  </section>

  <script>
    async function laadSelecties() {
      const { data: edities } = await supabase.from("edities").select("*").order("startdatum");
      document.getElementById("editieSelect").innerHTML = edities.map(e =>
        `<option value="${e.id}">${e.naam}</option>`).join("");

      const { data: onderdelen } = await supabase.from("sportonderdelen").select("*").order("sport, discipline, onderdeel, geslacht");
      const opties = onderdelen.map(o => ({
        label: `${o.sport} → ${o.discipline || '-'} → ${o.onderdeel} → ${o.geslacht}`,
        value: `${o.sport}|${o.discipline}|${o.onderdeel}|${o.geslacht}`
      }));
      document.getElementById("onderdeelSelect").innerHTML = opties.map(o =>
        `<option value="${o.value}">${o.label}</option>`).join("");
    }

    async function haalToernooiformat(sport, discipline, onderdeel, geslacht) {
      const { data } = await supabase.from("toernooiformats").select("rondes")
        .eq("sport", sport).eq("discipline", discipline).eq("onderdeel", onderdeel).eq("geslacht", geslacht);
      return data?.[0]?.rondes || [
        { naam: "Series", offset: -2, tijd: "Ochtend", label: "kwalificatie" },
        { naam: "Halve Finale", offset: -1, tijd: "Middag", label: "eliminatie" },
        { naam: "Finale", offset: 0, tijd: "Avond", label: "medaille" }
      ];
    }

    async function genereerSchema() {
      const finaleDag = parseInt(document.getElementById("finaleDag").value);
      const tijdslotFinale = document.getElementById("tijdslotFinale").value;
      if (!finaleDag) return alert("Geef een finaledag op");

      const [sport, discipline, onderdeel, geslacht] = document.getElementById("onderdeelSelect").value.split("|");
      const rondes = await haalToernooiformat(sport, discipline, onderdeel, geslacht);
      rondes.find(r => r.offset === 0).tijd = tijdslotFinale;

      document.getElementById("schemaPreview").innerHTML = rondes.map(r =>
        `<p>🕑 Dag ${finaleDag + r.offset} – ${r.naam} (${r.tijd}) – [${r.label}]</p>`).join("");
    }

    document.getElementById("onderdeelSelect").addEventListener("change", vulBestaandeGegevens);
  </script>
</body>
</html>
