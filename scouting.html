<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔍 Scouten</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
</head>
<body>
  <header>
    <h1>🔍 Scouten</h1>
    <nav><a href="manager.html">⬅️ Terug naar Manager</a></nav>
  </header>

  <main>
    <label for="sportSelect">Kies sportonderdeel:</label>
    <select id="sportSelect"></select>
    <button onclick="scoutAtleten()">🎯 Scout</button>

    <div id="resultaten"></div>
  </main>

  <script>
    const gebruiker = JSON.parse(localStorage.getItem("loggedInUser"));

    async function laadSporten() {
      const { data } = await supabase.from("sportonderdelen").select("*");
      const select = document.getElementById("sportSelect");
      data.forEach(opt => {
        const optie = document.createElement("option");
        optie.value = JSON.stringify(opt);
        optie.textContent = `${opt.sport} – ${opt.geslacht} – ${opt.onderdeel}`;
        select.appendChild(optie);
      });
    }

    async function scoutAtleten() {
      const gekozen = JSON.parse(document.getElementById("sportSelect").value);
      const resultaten = document.getElementById("resultaten");
      resultaten.innerHTML = "";

      let lijst = [];
      for (let i = 0; i < 6; i++) {
        lijst.push({
          naam: genereerNaam(gebruiker.land),
          leeftijd: Math.floor(Math.random() * 10) + 18,
          sport: gekozen.sport,
          discipline: gekozen.discipline,
          geslacht: gekozen.geslacht,
          onderdeel: gekozen.onderdeel,
          snelheid: Math.random() * 100,
          kracht: Math.random() * 100,
          techniek: Math.random() * 100
        });
      }

      lijst.forEach((atl) => {
        const div = document.createElement("div");
        div.innerHTML = `
          <strong>${atl.naam}</strong> (${atl.leeftijd} jaar)<br>
          Snelheid: ${atl.snelheid.toFixed(1)} | Kracht: ${atl.kracht.toFixed(1)} | Techniek: ${atl.techniek.toFixed(1)}<br>
          <button onclick='neemAan(${JSON.stringify(JSON.stringify(atl))})'>➕ Neem aan</button>
          <hr>
        `;
        resultaten.appendChild(div);
      });
    }

    async function neemAan(atleetJSON) {
      const atl = JSON.parse(atleetJSON);
      atl.owner = gebruiker.email;

      await supabase.from("atleten").insert([atl]);
      gebruiker.mp -= 10;
      await supabase.from("users").update({ mp: gebruiker.mp }).eq("email", gebruiker.email);
      localStorage.setItem("loggedInUser", JSON.stringify(gebruiker));

      alert(`${atl.naam} is toegevoegd aan jouw team!`);
    }

    function genereerNaam(land) {
      const voornamen = ["Alex", "Liam", "Sven", "Noah", "Julian", "Max", "Kai"];
      const achternamen = ["Jansen", "Kovacs", "Nguyen", "Petrov", "Dimitrov", "Smith", "Garcia"];
      return `${voornamen[Math.floor(Math.random() * voornamen.length)]} ${achternamen[Math.floor(Math.random() * achternamen.length)]}`;
    }

    laadSporten();
  </script>
</body>
</html>
