<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edities beheren</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>📅 Edities beheren</h1>
    <nav>
      <a href="admin.html">⬅️ Terug naar Admin</a>
    </nav>
  </header>

  <main>
    <section>
      <h2>➕ Nieuwe editie toevoegen</h2>
      <form id="editieForm">
        <label for="soort">Soort Editie:</label>
        <select id="soort" required>
          <option value="">-- Kies een soort --</option>
          <option value="Zomer editie">Zomer editie</option>
          <option value="Winter editie">Winter editie</option>
        </select><br/><br/>

        <label for="stad">Gaststad:</label>
        <input type="text" id="stad" required><br/><br/>

        <label for="land">Gastland:</label>
        <input type="text" id="land" required><br/><br/>

        <label for="datum">Startdatum:</label>
        <input type="date" id="datum" required><br/><br/>

        <button type="submit">Toevoegen</button>
      </form>
    </section>

    <section>
      <h2>📋 Bestaande edities</h2>
      <ul id="editieLijst"></ul>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie</p>
  </footer>

  <script>
    const editieForm = document.getElementById("editieForm");
    const lijst = document.getElementById("editieLijst");
    let edities = JSON.parse(localStorage.getItem("edities")) || [];

    functieToonEdities();

    editieForm.addEventListener("submit", e => {
      e.preventDefault();

      const soort = document.getElementById("soort").value;
      const stad = document.getElementById("stad").value.trim();
      const land = document.getElementById("land").value.trim();
      const datum = document.getElementById("datum").value;

      if (!soort || !stad || !land || !datum) {
        alert("Vul alle velden in.");
        return;
      }

      // Tel bestaande edities van deze soort
      const aantal = edities.filter(e => e.soort === soort).length + 1;
      const naam = `${soort} ${aantal}`;

      const nieuweEditie = {
        naam,
        soort,
        stad,
        land,
        datum,
        actief: false
      };

      edities.push(nieuweEditie);
      localStorage.setItem("edities", JSON.stringify(edities));
      functieToonEdities();
      editieForm.reset();
    });

    function functieToonEdities() {
      lijst.innerHTML = "";

      if (edities.length === 0) {
        lijst.innerHTML = "<li>Er zijn nog geen edities.</li>";
        return;
      }

      edities.forEach((e, index) => {
        const li = document.createElement("li");
        li.innerHTML = `
          <strong>${e.naam}</strong> – ${e.stad}, ${e.land} – Start: ${e.datum}
          ${e.actief ? "<span style='color:green;'>🟢 Actief</span>" : ""}
          <button onclick="toggleActief(${index})">Actief maken</button>
        `;
        lijst.appendChild(li);
      });
    }

    function toggleActief(index) {
      edities = edities.map((e, i) => ({ ...e, actief: i === index }));
      localStorage.setItem("edities", JSON.stringify(edities));
      functieToonEdities();
    }
  </script>
</body>
</html>
