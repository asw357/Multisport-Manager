<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎯 Admin – Toernooirondes Instellen</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabaseClient.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    form, table { max-width: 800px; margin: auto; }
    input, select {
      width: 100%;
      padding: 6px;
      margin: 5px 0;
    }
    button {
      padding: 8px 12px;
      margin-top: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 6px;
    }
    th {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>
  <header>
    <h1>🎯 Admin – Toernooirondes Instellen</h1>
    <nav><a href="admin.html">⬅️ Terug naar Admin</a></nav>
  </header>

  <main>
    <form id="rondeForm">
      <label for="editie_id">Editie</label>
      <select id="editie_id" required></select>

      <label for="sport">Sport</label>
      <select id="sport" required></select>

      <label for="discipline">Discipline</label>
      <select id="discipline" required></select>

      <label for="onderdeel">Onderdeel</label>
      <select id="onderdeel" required></select>

      <label for="aantal_rondes">Aantal rondes</label>
      <input type="number" id="aantal_rondes" min="1" max="8" value="1" required />
      <div id="rondeVelden"></div>

      <label for="max_algemeen">Maximaal aantal deelnemers (totaal)</label>
      <input type="number" id="max_algemeen" required />

      <label for="max_per_land">Maximaal aantal per land</label>
      <input type="number" id="max_per_land" required />

      <label for="aantal_pogingen">Aantal pogingen (optioneel)</label>
      <input type="number" id="aantal_pogingen" />

      <label for="aantal_races">Aantal races (optioneel)</label>
      <input type="number" id="aantal_races" />

      <button type="submit">➕ Voeg rondes toe</button>
    </form>

    <h2>📑 Ingevoerde Ronde-instellingen</h2>
    <table>
      <thead>
        <tr>
          <th>Editie</th>
          <th>Sport</th>
          <th>Discipline</th>
          <th>Onderdeel</th>
          <th>Ronde</th>
          <th>Volgorde</th>
          <th>Max (totaal)</th>
          <th>Max/land</th>
          <th>Pogingen</th>
          <th>Races</th>
          <th>Actie</th>
        </tr>
      </thead>
      <tbody id="rondeTabel"></tbody>
    </table>
  </main>

  <script>
    async function laadDropdowns() {
      const { data: edities } = await supabase
        .from("edities")
        .select("id, naam, status")
        .eq("status", "gepland")
        .order("startdatum");

      const editieSelect = document.getElementById("editie_id");
      edities?.forEach(e => {
        const option = document.createElement("option");
        option.value = e.id;
        option.textContent = e.naam;
        editieSelect.appendChild(option);
      });

      const { data: onderdelen } = await supabase.from("sportonderdelen").select("*");
      const sporten = [...new Set(onderdelen.map(o => o.sport))];
      const disciplines = [...new Set(onderdelen.map(o => o.discipline))];
      const onderdelenset = [...new Set(onderdelen.map(o => o.onderdeel))];

      const s = document.getElementById("sport");
      const d = document.getElementById("discipline");
      const o = document.getElementById("onderdeel");

      sporten.forEach(val => s.innerHTML += `<option value="${val}">${val}</option>`);
      disciplines.forEach(val => d.innerHTML += `<option value="${val}">${val}</option>`);
      onderdelenset.forEach(val => o.innerHTML += `<option value="${val}">${val}</option>`);
    }

    document.getElementById("aantal_rondes").addEventListener("input", () => {
      const aantal = parseInt(document.getElementById("aantal_rondes").value);
      const container = document.getElementById("rondeVelden");
      container.innerHTML = "";
      for (let i = 1; i <= aantal; i++) {
        container.innerHTML += `
          <label for="ronde_${i}">Naam ronde ${i}</label>
          <input type="text" id="ronde_${i}" required />
        `;
      }
    });

    async function laadRondes() {
      const { data } = await supabase.from("rondes").select("*").order("volgorde", { ascending: true });
      const tbody = document.getElementById("rondeTabel");
      tbody.innerHTML = "";

      data?.forEach(r => {
        const rij = document.createElement("tr");
        rij.innerHTML = `
          <td>${r.editie_id}</td>
          <td>${r.sport}</td>
          <td>${r.discipline}</td>
          <td>${r.onderdeel}</td>
          <td>${r.ronde}</td>
          <td>${r.volgorde}</td>
          <td>${r.max_algemeen}</td>
          <td>${r.max_per_land}</td>
          <td>${r.aantal_pogingen || "-"}</td>
          <td>${r.aantal_races || "-"}</td>
          <td><button onclick="verwijderRonde('${r.id}')">🗑️</button></td>
        `;
        tbody.appendChild(rij);
      });
    }

    async function verwijderRonde(id) {
      await supabase.from("rondes").delete().eq("id", id);
      laadRondes();
    }

    document.getElementById("rondeForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const aantal = parseInt(document.getElementById("aantal_rondes").value);
      const records = [];

      for (let i = 1; i <= aantal; i++) {
        const record = {
          editie_id: document.getElementById("editie_id").value,
          sport: document.getElementById("sport").value,
          discipline: document.getElementById("discipline").value,
          onderdeel: document.getElementById("onderdeel").value,
          ronde: document.getElementById(`ronde_${i}`).value,
          volgorde: i,
          max_algemeen: parseInt(document.getElementById("max_algemeen").value),
          max_per_land: parseInt(document.getElementById("max_per_land").value),
          aantal_pogingen: parseInt(document.getElementById("aantal_pogingen").value) || null,
          aantal_races: parseInt(document.getElementById("aantal_races").value) || null
        };
        records.push(record);
      }

      await supabase.from("rondes").insert(records);
      this.reset();
      document.getElementById("rondeVelden").innerHTML = "";
      laadRondes();
    });

    laadDropdowns();
    laadRondes();
  </script>
</body>
</html>
