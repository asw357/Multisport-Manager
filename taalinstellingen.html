<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taalinstellingen</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>🌐 Taalinstellingen</h1>
    <nav>
      <ul>
        <li><a href="profiel.html">⬅️ Terug naar Profiel</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <h2>Kies jouw voorkeurstaal:</h2>
      <form id="taalForm">
        <label for="taalSelect">Taal:</label><br />
        <select id="taalSelect" required>
          <option value="nl">🇳🇱 Nederlands</option>
          <option value="en">🇬🇧 English</option>
          <option value="de">🇩🇪 Deutsch</option>
          <option value="fr">🇫🇷 Français</option>
        </select><br /><br />
        <button type="submit">Opslaan</button>
      </form>
      <p id="feedback" style="margin-top:10px;"></p>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie – Taalinstellingen</p>
  </footer>

  <script>
    const user = JSON.parse(localStorage.getItem("loggedInUser"));
    if (!user) {
      alert("Niet ingelogd.");
      window.location.href = "login.html";
    }

    const taalSelect = document.getElementById("taalSelect");
    const feedback = document.getElementById("feedback");

    // Zet huidige taal als default
    if (user.taal) {
      taalSelect.value = user.taal;
    }

    document.getElementById("taalForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const gekozenTaal = taalSelect.value;

      // Update in huidige gebruiker
      user.taal = gekozenTaal;
      localStorage.setItem("loggedInUser", JSON.stringify(user));

      // Update in users-array
      const allUsers = JSON.parse(localStorage.getItem("users")) || [];
      const i = allUsers.findIndex(u => u.email === user.email);
      if (i !== -1) {
        allUsers[i].taal = gekozenTaal;
        localStorage.setItem("users", JSON.stringify(allUsers));
      }

      feedback.textContent = "Taal succesvol opgeslagen!";
      feedback.style.color = "green";
    });
  </script>
</body>
</html>
