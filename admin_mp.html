<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MP-instellingen Beheren</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>💰 MP-instellingen</h1>
    <nav>
      <ul>
        <li><a href="admin.html">⬅️ Terug naar Admin Dashboard</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <form id="mpForm">
        <label for="mpGoud">Goud 🥇:</label>
        <input type="number" id="mpGoud" value="100"><br />
        <label for="mpZilver">Zilver 🥈:</label>
        <input type="number" id="mpZilver" value="60"><br />
        <label for="mpBrons">Brons 🥉:</label>
        <input type="number" id="mpBrons" value="40"><br />
        <label for="mpTop8">Top 8:</label>
        <input type="number" id="mpTop8" value="10"><br /><br />
        <button type="submit">Opslaan</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Sport Manager Simulatie – MP Beheer</p>
  </footer>

  <script>
    const ADMIN_EMAIL = "wilcoboesveld12@hotmail.com";
    const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
    if (!loggedInUser || loggedInUser.email !== ADMIN_EMAIL) {
      alert("Toegang geweigerd.");
      window.location.href = "index.html";
    }

    const mpForm = document.getElementById("mpForm");

    mpForm.addEventListener("submit", function (e) {
      e.preventDefault();
      const mp = {
        goud: parseInt(document.getElementById("mpGoud").value),
        zilver: parseInt(document.getElementById("mpZilver").value),
        brons: parseInt(document.getElementById("mpBrons").value),
        top8: parseInt(document.getElementById("mpTop8").value)
      };
      localStorage.setItem("mp_settings", JSON.stringify(mp));
      alert("MP-instellingen opgeslagen!");
    });

    document.addEventListener("DOMContentLoaded", function () {
      const saved = JSON.parse(localStorage.getItem("mp_settings"));
      if (saved) {
        document.getElementById("mpGoud").value = saved.goud || 100;
        document.getElementById("mpZilver").value = saved.zilver || 60;
        document.getElementById("mpBrons").value = saved.brons || 40;
        document.getElementById("mpTop8").value = saved.top8 || 10;
      }
    });
  </script>
</body>
</html>
